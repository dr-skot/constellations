<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Art Alignment</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box }
body {
  background: #05060f; color: #d8e2ff;
  font: 14px system-ui, sans-serif;
  display: flex; flex-direction: column; align-items: center;
  min-height: 100vh; padding: 20px; gap: 14px;
}
h1 { font-size: 1.1rem; color: #5b8af5; letter-spacing: .1em; text-transform: uppercase }
#top { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center }
select {
  background: #0c0f1e; color: #d8e2ff;
  border: 1px solid rgba(255,255,255,.18);
  border-radius: 8px; padding: 6px 12px; font-size: .9rem; cursor: pointer;
}
#canvas-wrap {
  width: 520px; height: 520px;
  border-radius: 50%;
  overflow: hidden;
}
canvas { display: block }
#controls {
  width: 520px; max-width: 100%;
  display: grid; grid-template-columns: 90px 1fr 72px;
  gap: 6px 10px; align-items: center;
}
.lbl { text-align: right; color: #5a6480; font-size: .82rem }
input[type=range] { width: 100%; accent-color: #5b8af5 }
.val { font-size: .82rem; color: #b0ccff; font-variant-numeric: tabular-nums }
button {
  background: rgba(91,138,245,.12); border: 1px solid rgba(91,138,245,.4);
  color: #b0ccff; border-radius: 8px; padding: 6px 14px;
  cursor: pointer; font-size: .85rem;
}
button:hover { background: rgba(91,138,245,.28) }
#output { font-size: .82rem; color: #6f8; font-family: monospace; letter-spacing: .04em; min-height: 1.2em; max-width: 520px; word-break: break-all; }
label { display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: .85rem; color: #7080a0 }
label:hover { color: #b0ccff }
</style>
</head>
<body>
<h1>Art Alignment</h1>
<div id="top">
  <select id="con-sel"></select>
  <label><input type="checkbox" id="chk-photo"> Photo</label>
  <label><input type="checkbox" id="chk-diagram" checked> Diagram</label>
  <label><input type="checkbox" id="chk-art" checked> Artwork</label>
  <button id="btn-reset">Reset</button>
</div>
<div id="canvas-wrap">
  <canvas id="canvas" width="520" height="520"></canvas>
</div>
<div id="controls">
  <span class="lbl">Rotate</span>
  <input type="range" id="sl-rotate" min="-180" max="180" value="0" step="0.5">
  <span class="val" id="vl-rotate">0.0°</span>

  <span class="lbl">Scale</span>
  <input type="range" id="sl-scale" min="25" max="400" value="100" step="1">
  <span class="val" id="vl-scale">1.00×</span>

  <span class="lbl">X offset</span>
  <input type="range" id="sl-dx" min="-260" max="260" value="0" step="1">
  <span class="val" id="vl-dx">0</span>

  <span class="lbl">Y offset</span>
  <input type="range" id="sl-dy" min="-260" max="260" value="0" step="1">
  <span class="val" id="vl-dy">0</span>
</div>
<button id="btn-copy">Copy anchor JSON</button>
<div id="output">—</div>

<script src="js/data.js"></script>
<script src="js/projection.js"></script>
<script>
const W = 520, H = 520;
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const photoCache = {};
const artCache = {};
let currentCon = null;
let photoImg = null;

const ANCHOR_COLORS = ['#ff4040', '#40ff80', '#4080ff'];

function drawCross(x, y, size, color, style) {
  ctx.save();
  ctx.strokeStyle = color; ctx.lineWidth = 2;
  ctx.shadowColor = color; ctx.shadowBlur = 4;
  ctx.beginPath();
  if (style === 'x') {
    ctx.moveTo(x - size, y - size); ctx.lineTo(x + size, y + size);
    ctx.moveTo(x + size, y - size); ctx.lineTo(x - size, y + size);
  } else {
    ctx.moveTo(x - size, y); ctx.lineTo(x + size, y);
    ctx.moveTo(x, y - size); ctx.lineTo(x, y + size);
  }
  ctx.stroke();
  ctx.restore();
}

function getTweak() {
  return {
    rotate: parseFloat(document.getElementById('sl-rotate').value) * Math.PI / 180,
    scale:  parseFloat(document.getElementById('sl-scale').value) / 100,
    dx:     parseFloat(document.getElementById('sl-dx').value),
    dy:     parseFloat(document.getElementById('sl-dy').value),
  };
}

function applyTweak(pts, tweak) {
  const cx = pts.reduce((s, p) => s + p[0], 0) / pts.length;
  const cy = pts.reduce((s, p) => s + p[1], 0) / pts.length;
  const cos = Math.cos(tweak.rotate), sin = Math.sin(tweak.rotate);
  return pts.map(([x, y]) => {
    const rx = x - cx, ry = y - cy;
    return [
      cx + (rx * cos - ry * sin) * tweak.scale + tweak.dx,
      cy + (rx * sin + ry * cos) * tweak.scale + tweak.dy,
    ];
  });
}

function loadArt(con, callback) {
  const src = artSrc(con.abbr);
  const art = ART[src];
  if (!art) return;
  if (artCache[src] instanceof HTMLImageElement) { callback(artCache[src]); return; }
  if (artCache[src] === 'loading' || artCache[src] === 'error') return;
  artCache[src] = 'loading';
  const img = new Image();
  img.onload = () => { artCache[src] = img; callback(img); };
  img.onerror = () => { artCache[src] = 'error'; };
  img.src = art.url;
}

function drawArt(con) {
  const src = artSrc(con.abbr);
  const art = ART[src];
  if (!art) return;
  const img = artCache[src];
  if (!(img instanceof HTMLImageElement)) return;
  const canvasPts = projectStarsTAN(art.anchors.map(a => [a.ra, a.dec, 0]), con, W, H);
  const iw = img.naturalWidth, ih = img.naturalHeight;
  const imgPts = art.anchors.map(a => [a.px * iw, a.py * ih]);
  const naturalDst = canvasPts.map(p => [p.x, p.y]);
  const tweakedDst = applyTweak(naturalDst, getTweak());
  const xform = solveAffine(imgPts, tweakedDst);
  ctx.save();
  ctx.setTransform(...xform);
  ctx.globalAlpha = 0.60;
  ctx.globalCompositeOperation = 'screen';
  ctx.drawImage(img, 0, 0, iw, ih);
  // X markers at anchor image positions (move with the art)
  imgPts.forEach(([px, py], i) =>
    drawCross(px, py, 12, ANCHOR_COLORS[i % ANCHOR_COLORS.length], 'x'));
  ctx.restore();
  // + markers at original sky positions (fixed)
  naturalDst.forEach(([x, y], i) =>
    drawCross(x, y, 10, ANCHOR_COLORS[i % ANCHOR_COLORS.length], '+'));
}

const sorted = [...C].sort((a, b) => a.name.localeCompare(b.name));
const sel = document.getElementById('con-sel');
sorted.forEach(con => {
  const opt = document.createElement('option');
  opt.value = con.abbr;
  opt.textContent = con.name;
  sel.appendChild(opt);
});

function magToR(m) {
  return m <= -1 ? 7 : m < 0 ? 6 : m < 1 ? 5 : m < 2 ? 3.8 : m < 3 ? 2.8 : m < 4 ? 2.0 : m < 5 ? 1.4 : 1.0;
}
function starCol(h) {
  return h === 'r' ? '#ff7060' : h === 'o' ? '#ffb860' : h === 'b' ? '#90c8ff' : '#f5eedc';
}

function draw() {
  const con = currentCon;
  if (!con) return;

  ctx.fillStyle = '#010208';
  ctx.fillRect(0, 0, W, H);

  if (document.getElementById('chk-photo').checked && photoImg) {
    ctx.drawImage(photoImg, 0, 0, W, H);
  }

  if (document.getElementById('chk-art').checked) {
    drawArt(con);
  }

  if (document.getElementById('chk-diagram').checked) {
    const proj = projectStarsTAN(con.stars, con, W, H);
    for (const [i, j] of con.lines) {
      const a = proj[i], b = proj[j];
      if (!a || !b || a.d <= 0 || b.d <= 0) continue;
      ctx.save();
      ctx.strokeStyle = 'rgba(80,145,230,0.6)'; ctx.lineWidth = 1.5;
      ctx.shadowColor = 'rgba(100,160,255,0.4)'; ctx.shadowBlur = 5;
      ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
      ctx.restore();
    }
    for (const p of proj) {
      if (p.d <= 0) continue;
      const r = magToR(p.mag), col = starCol(p.hint);
      ctx.save();
      ctx.shadowColor = col; ctx.shadowBlur = p.mag < 2 ? 8 : p.mag < 3 ? 4 : 2;
      ctx.fillStyle = col;
      ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }
  }
}

function loadPhoto(con) {
  photoImg = null;
  if (photoCache[con.abbr] instanceof HTMLImageElement) {
    photoImg = photoCache[con.abbr]; draw(); return;
  }
  const img = new Image();
  img.onload = () => { photoCache[con.abbr] = img; photoImg = img; draw(); };
  img.onerror = () => { photoCache[con.abbr] = null; };
  img.src = `img/${con.abbr}.jpg`;
}

function resetSliders() {
  document.getElementById('sl-rotate').value = 0;
  document.getElementById('sl-scale').value  = 100;
  document.getElementById('sl-dx').value     = 0;
  document.getElementById('sl-dy').value     = 0;
  document.getElementById('vl-rotate').textContent = '0.0°';
  document.getElementById('vl-scale').textContent  = '1.00×';
  document.getElementById('vl-dx').textContent     = '0';
  document.getElementById('vl-dy').textContent     = '0';
}

function selectCon(abbr) {
  currentCon = C.find(c => c.abbr === abbr);
  if (!currentCon) return;
  resetSliders();
  loadPhoto(currentCon);
  loadArt(currentCon, () => draw());
  draw();
}

function onSlider() {
  const rotate = parseFloat(document.getElementById('sl-rotate').value);
  const scale  = parseFloat(document.getElementById('sl-scale').value) / 100;
  const dx     = parseFloat(document.getElementById('sl-dx').value);
  const dy     = parseFloat(document.getElementById('sl-dy').value);
  document.getElementById('vl-rotate').textContent = rotate.toFixed(1) + '°';
  document.getElementById('vl-scale').textContent  = scale.toFixed(2) + '×';
  document.getElementById('vl-dx').textContent     = dx.toFixed(0);
  document.getElementById('vl-dy').textContent     = dy.toFixed(0);
  draw();
}

sel.addEventListener('change', () => selectCon(sel.value));
['sl-rotate','sl-scale','sl-dx','sl-dy'].forEach(id =>
  document.getElementById(id).addEventListener('input', onSlider));
['chk-photo','chk-diagram','chk-art'].forEach(id =>
  document.getElementById(id).addEventListener('change', draw));

document.getElementById('btn-reset').addEventListener('click', () => {
  resetSliders(); draw();
});

document.getElementById('btn-copy').addEventListener('click', () => {
  const con = currentCon;
  if (!con) return;
  const src = artSrc(con.abbr);
  const art = ART[src];
  if (!art) return;
  const canvasPts = projectStarsTAN(art.anchors.map(a => [a.ra, a.dec, 0]), con, W, H);
  const naturalDst = canvasPts.map(p => [p.x, p.y]);
  const tweakedDst = applyTweak(naturalDst, getTweak());
  const newAnchors = art.anchors.map((a, i) => {
    const { ra, dec } = pixelToRADec(tweakedDst[i][0], tweakedDst[i][1], con.ra, con.dec, con.fov, W, H);
    return { ra: parseFloat(ra.toFixed(6)), dec: parseFloat(dec.toFixed(6)), px: a.px, py: a.py };
  });
  const json = JSON.stringify(newAnchors);
  navigator.clipboard.writeText(json).then(() => {
    document.getElementById('output').textContent = json;
    const btn = document.getElementById('btn-copy');
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy anchor JSON'; }, 1500);
  });
});

selectCon('Ant');
sel.value = 'Ant';
</script>
</body>
</html>
