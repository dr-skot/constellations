<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#010208"/>
  <!-- Orion body only (no arms/bow) — accurate RA/Dec positions,
       east-left convention so Betelgeuse is on the left.
       Stars: Meissa(head), Betelgeuse, Bellatrix, belt×3, knee, Rigel, Saiph -->
  <g stroke="#8ab4f8" stroke-width="1.3" stroke-linecap="round">
    <!-- Head to shoulders -->
    <line x1="15.9" y1="2.0"  x2="8.8"  y2="5.6"/>   <!-- Meissa–Betelgeuse -->
    <line x1="15.9" y1="2.0"  x2="19.5" y2="7.1"/>   <!-- Meissa–Bellatrix  -->
    <!-- Chest -->
    <line x1="8.8"  y1="5.6"  x2="19.5" y2="7.1"/>   <!-- Betelgeuse–Bellatrix -->
    <!-- Shoulders to belt -->
    <line x1="8.8"  y1="5.6"  x2="13.9" y2="19.0"/>  <!-- Betelgeuse–Alnitak -->
    <line x1="19.5" y1="7.1"  x2="17.0" y2="16.6"/>  <!-- Bellatrix–Mintaka  -->
    <!-- Belt -->
    <line x1="13.9" y1="19.0" x2="15.5" y2="17.9"/>  <!-- Alnitak–Alnilam   -->
    <line x1="15.5" y1="17.9" x2="17.0" y2="16.6"/>  <!-- Alnilam–Mintaka   -->
    <!-- Left leg to Saiph -->
    <line x1="13.9" y1="19.0" x2="11.4" y2="30.0"/>  <!-- Alnitak–Saiph     -->
    <!-- Right leg to Rigel (via knee) -->
    <line x1="17.0" y1="16.6" x2="19.7" y2="19.6"/>  <!-- Mintaka–knee      -->
    <line x1="19.7" y1="19.6" x2="23.3" y2="27.9"/>  <!-- knee–Rigel        -->
  </g>
  <g fill="#ffffff">
    <circle cx="15.9" cy="2.0"  r="1.0"/> <!-- Meissa     mag 3.4 -->
    <circle cx="8.8"  cy="5.6"  r="1.9"/> <!-- Betelgeuse mag 0.5 -->
    <circle cx="19.5" cy="7.1"  r="1.5"/> <!-- Bellatrix  mag 1.6 -->
    <circle cx="13.9" cy="19.0" r="1.5"/> <!-- Alnitak    mag 1.7 -->
    <circle cx="15.5" cy="17.9" r="1.5"/> <!-- Alnilam    mag 1.7 -->
    <circle cx="17.0" cy="16.6" r="1.3"/> <!-- Mintaka    mag 2.2 -->
    <circle cx="11.4" cy="30.0" r="1.3"/> <!-- Saiph      mag 2.1 -->
    <circle cx="19.7" cy="19.6" r="0.9"/> <!-- knee       mag 3.4 -->
    <circle cx="23.3" cy="27.9" r="2.1"/> <!-- Rigel      mag 0.2 -->
  </g>
</svg>
