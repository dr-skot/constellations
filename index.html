<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Constellation Quiz</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#05060f;--card:#0c0f1e;--border:rgba(255,255,255,0.08);
  --accent:#5b8af5;--accent2:#a456f7;--text:#d8e2ff;--dim:#5a6480;
  --ok:#22c55e;--err:#ef4444;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif}
#app{max-width:680px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;padding:12px}
.screen{display:none;flex-direction:column;gap:12px;flex:1}
.screen.active{display:flex}
.logo{text-align:center;padding:12px 0 4px}
.logo h1{font-size:1.7rem;font-weight:300;letter-spacing:.25em;text-transform:uppercase;color:#a8bfff}
.logo p{margin-top:6px;color:var(--dim);font-size:.8rem;letter-spacing:.12em}
.sec-label{font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);margin-bottom:8px}
.pill-group{display:flex;gap:8px;flex-wrap:wrap}
.pill{flex:1;min-width:90px;padding:10px 8px;border:1px solid var(--border);background:var(--card);
  color:var(--dim);border-radius:10px;cursor:pointer;font-size:.88rem;text-align:center;
  transition:all .18s;line-height:1.3}
.pill:hover{border-color:var(--accent);color:var(--text)}
.pill.on{border-color:var(--accent);background:rgba(91,138,245,.14);color:#b0ccff}
.pill small{display:block;font-size:.68rem;margin-top:3px;opacity:.7}
.btn-go{align-self:center;padding:14px 40px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;border:none;border-radius:12px;font-size:1rem;cursor:pointer;letter-spacing:.06em;transition:opacity .2s}
.btn-go:hover{opacity:.85}
/* quiz */
.hud{display:flex;justify-content:space-between;align-items:center;font-size:.82rem;color:var(--dim)}
.hud-score{color:#a8bfff;font-weight:500}
.prog-wrap{height:3px;background:rgba(255,255,255,.08);border-radius:2px;margin-top:6px}
.prog-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .35s}
#canvas-wrap{border-radius:14px;overflow:hidden;border:1px solid var(--border);background:#010208;
  position:relative;aspect-ratio:1;flex-shrink:0;width:80%;align-self:center}
canvas{display:block;width:100%;height:100%}
#photo-box{display:none;position:absolute;inset:0;background:#010208;
  align-items:center;justify-content:center;flex-direction:column;gap:12px}
#photo-box.show{display:flex}
#photo-img{width:100%;height:100%;object-fit:cover;display:none;border-radius:inherit}
#photo-img.show{display:block}
#photo-msg{color:var(--dim);font-size:.82rem;text-align:center;padding:0 20px}
.q-label{text-align:center;color:var(--dim);font-size:.8rem;letter-spacing:.1em}
.ans-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ans-btn{padding:9px 10px;border:1px solid var(--border);background:var(--card);color:var(--text);
  border-radius:10px;cursor:pointer;font-size:.88rem;text-align:center;transition:all .18s}
.ans-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(91,138,245,.1)}
.ans-btn:disabled{cursor:default}
.ans-btn.ok{border-color:var(--ok)!important;background:rgba(34,197,94,.14)!important;color:#86efac!important}
.ans-btn.err{border-color:var(--err)!important;background:rgba(239,68,68,.14)!important;color:#fca5a5!important}
#feedback{text-align:center;min-height:22px;font-size:.88rem;color:var(--dim)}
.btn-next{align-self:center;padding:8px 28px;border:1px solid var(--accent);background:rgba(91,138,245,.12);
  color:#b0ccff;border-radius:10px;cursor:pointer;font-size:.9rem;transition:all .18s;display:none}
.btn-next.show{display:block}
.btn-next:hover{background:rgba(91,138,245,.22)}
/* results */
.result-wrap{text-align:center;padding:20px 0}
.result-num{font-size:3.5rem;font-weight:200;color:#a8bfff;letter-spacing:.04em}
.result-sub{color:var(--dim);margin-top:4px}
.result-grade{font-size:1.3rem;margin-top:16px;letter-spacing:.06em}
.result-stars{font-size:2rem;margin-top:8px;letter-spacing:.15em}
.btn-again{align-self:center;padding:13px 32px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;border:none;border-radius:12px;font-size:.95rem;cursor:pointer;transition:opacity .2s}
.btn-again:hover{opacity:.85}
.btn-settings{align-self:center;padding:12px 28px;border:1px solid var(--accent);background:rgba(91,138,245,.1);
  color:#b0ccff;border-radius:12px;font-size:.95rem;cursor:pointer;transition:all .18s}
.btn-settings:hover{background:rgba(91,138,245,.2)}
</style>
</head>
<body>
<div id="app">

<div id="screen-start" class="screen active">
  <div class="logo">
    <h1>✦ Constellation Quiz</h1>
    <p>Train your visual recognition of the night sky</p>
  </div>
  <div>
    <div class="sec-label">Display Mode</div>
    <div class="pill-group" id="mode-group">
      <button class="pill on" data-val="diagram">Diagram<small>lines + stars</small></button>
      <button class="pill" data-val="stars">Stars Only<small>no lines</small></button>
      <button class="pill" data-val="photo">Photograph<small>real DSS image</small></button>
    </div>
  </div>
  <div>
    <div class="sec-label">Difficulty</div>
    <div class="pill-group" id="diff-group">
      <button class="pill on" data-val="1">Famous<small>12 constellations</small></button>
      <button class="pill" data-val="2">Familiar<small>adds 30 more</small></button>
      <button class="pill" data-val="3">Expert<small>all 88</small></button>
    </div>
  </div>
  <div>
    <div class="sec-label">Hemisphere</div>
    <div class="pill-group" id="hem-group">
      <button class="pill on" data-val="B">Both</button>
      <button class="pill" data-val="N">Northern</button>
      <button class="pill" data-val="S">Southern</button>
    </div>
  </div>
  <button class="btn-go" id="btn-start">Start Quiz ›</button>
</div>

<div id="screen-quiz" class="screen">
  <div>
    <div class="hud">
      <span id="hud-progress">1 / 10</span>
      <span class="hud-score" id="hud-score">0 correct</span>
    </div>
    <div class="prog-wrap"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div id="canvas-wrap">
    <canvas id="quiz-canvas"></canvas>
    <div id="photo-box">
      <img id="photo-img" alt="Night sky photograph">
      <div id="photo-msg">Loading DSS sky photograph…</div>
    </div>
  </div>
  <p class="q-label">What constellation is this?</p>
  <div class="ans-grid" id="ans-grid"></div>
  <div id="feedback"></div>
  <button class="btn-next" id="btn-next">Next →</button>
</div>

<div id="screen-result" class="screen">
  <div class="result-wrap">
    <div class="result-num" id="res-score">0 / 0</div>
    <div class="result-sub">constellations identified correctly</div>
    <div class="result-grade" id="res-grade"></div>
    <div class="result-stars" id="res-stars"></div>
  </div>
  <button class="btn-again" id="btn-again">Play Again</button>
  <button class="btn-settings" id="btn-settings">Change Settings</button>
</div>

</div>

// ═══════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════
function hashStr(s){let h=0;for(let i=0;i<s.length;i++)h=(Math.imul(31,h)+s.charCodeAt(i))|0;return h>>>0}
function makeRng(seed){let s=seed;return()=>{s=(s*1664525+1013904223)>>>0;return s/4294967296}}
function magToR(m){return m<=-1?7:m<0?6:m<1?5:m<2?3.8:m<3?2.8:m<4?2.0:m<5?1.4:1.0}
function starCol(h){return h==='r'?'#ff7060':h==='o'?'#ffb860':h==='b'?'#90c8ff':'#f5eedc'}

function photoUrl(con){
  return `img/${con.abbr}.jpg`;
}

// Project stars onto a TAN (gnomonic) image — same projection as photoUrl.
// East is left, north is up, center = (con.ra, con.dec), full width = con.fov degrees.
function projectStarsTAN(stars, con, W, H){
  const ra0=con.ra*Math.PI/180, dec0=con.dec*Math.PI/180;
  const scale=W/(con.fov*Math.PI/180);
  return stars.map(s=>{
    const ra=s[0]*Math.PI/180, dec=s[1]*Math.PI/180;
    const d=Math.sin(dec0)*Math.sin(dec)+Math.cos(dec0)*Math.cos(dec)*Math.cos(ra-ra0);
    const xi=Math.cos(dec)*Math.sin(ra-ra0)/d;
    const eta=(Math.cos(dec0)*Math.sin(dec)-Math.sin(dec0)*Math.cos(dec)*Math.cos(ra-ra0))/d;
    return {x:W/2-xi*scale, y:H/2-eta*scale, mag:s[2], hint:s[3], name:s[4]};
  });
}

// ═══════════════════════════════════════════════════════════
// PROJECTION  (RA/Dec → canvas x/y)
// ═══════════════════════════════════════════════════════════

// Compute projection parameters from a constellation's star array.
// Returns {cRA, cDec, cosD, scale, wrapped} — reusable for any RA/Dec point.
function getProjection(stars, W, H){
  const PAD = 0.12;
  let ras = stars.map(s => s[0]);
  const wrapped = Math.max(...ras) - Math.min(...ras) > 180;
  if(wrapped) ras = ras.map(r => r < 180 ? r + 360 : r);
  const decs  = stars.map(s => s[1]);
  const cRA   = (Math.min(...ras)  + Math.max(...ras))  / 2;
  const cDec  = (Math.min(...decs) + Math.max(...decs)) / 2;
  const cosD  = Math.cos(cDec * Math.PI / 180);
  const raSky = (Math.max(...ras) - Math.min(...ras)) * cosD;
  const decSp = Math.max(...decs) - Math.min(...decs);
  const scale = Math.max(raSky, decSp) / (1 - 2 * PAD) || 1;
  return {cRA, cDec, cosD, scale, wrapped, W, H};
}

// Project a single RA/Dec point using pre-computed projection params.
function projectPoint(ra, dec, p){
  let r = ra;
  if(p.wrapped && r < 180) r += 360;
  return {
    x: p.W/2 + (p.cRA - r) * p.cosD / p.scale * p.W,
    y: p.H/2 - (dec - p.cDec) / p.scale * p.H
  };
}

// Project all stars in a constellation to canvas coords.
function projectStars(stars, W, H){
  const p = getProjection(stars, W, H);
  return stars.map(s => ({...projectPoint(s[0], s[1], p), mag:s[2], hint:s[3], name:s[4]}));
}

// ═══════════════════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════════════════

function drawBackground(ctx, W, H, con, starField){
  const bg = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.hypot(W,H)/2);
  bg.addColorStop(0,'#0b0e1e'); bg.addColorStop(1,'#020408');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  if(!starField) return;
  const rng=makeRng(hashStr(con.name+'-bg'));
  ctx.save();
  for(let i=0;i<180;i++){
    const bx=rng()*W, by=rng()*H, m=3.8+rng()*3;
    const r=Math.max(.2,1.2-m*.15);
    ctx.globalAlpha=.12+rng()*.45;
    ctx.fillStyle=rng()>.8?'rgba(160,190,255,1)':'rgba(210,218,255,1)';
    ctx.beginPath(); ctx.arc(bx,by,r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1; ctx.restore();
}

function drawLines(ctx, proj, con){
  ctx.save();
  ctx.strokeStyle='rgba(80,145,230,0.52)';
  ctx.lineWidth=1.5;
  ctx.shadowColor='rgba(100,160,255,0.4)';
  ctx.shadowBlur=5;
  for(const [i,j] of con.lines){
    const a=proj[i], b=proj[j];
    if(!a||!b) continue;
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
  }
  ctx.restore();
}

function drawStars(ctx, proj){
  for(const p of proj){
    const r=magToR(p.mag), col=starCol(p.hint);
    if(p.mag<2.5){
      const gs=p.mag<0?26:p.mag<1?18:p.mag<2?13:8;
      const grd=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,gs);
      const hx=col.replace('#','');
      const ri=parseInt(hx.slice(0,2),16),gi=parseInt(hx.slice(2,4),16),bi=parseInt(hx.slice(4,6),16);
      grd.addColorStop(0,`rgba(${ri},${gi},${bi},0.28)`);
      grd.addColorStop(1,`rgba(${ri},${gi},${bi},0)`);
      ctx.fillStyle=grd;
      ctx.beginPath(); ctx.arc(p.x,p.y,gs,0,Math.PI*2); ctx.fill();
    }
    ctx.save();
    ctx.shadowColor=col; ctx.shadowBlur=p.mag<2?8:p.mag<3?4:2;
    ctx.fillStyle=col;
    ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function drawLabels(ctx, proj, W){
  const fs=Math.max(10,Math.round(W*0.036));
  ctx.save();
  ctx.font=`${fs}px system-ui,-apple-system,sans-serif`;
  ctx.textBaseline='middle';
  for(const p of proj){
    if(!p.name) continue;
    const col=starCol(p.hint), r=magToR(p.mag), pad=3;
    const tw=ctx.measureText(p.name).width, th=fs;
    const toRight=(p.x+r+6+tw+pad*2)<W-4;
    const lx=toRight?p.x+r+6:p.x-r-6-tw-pad*2, ly=p.y-th/2-pad;
    ctx.fillStyle='rgba(4,6,18,0.82)';
    ctx.beginPath();
    if(ctx.roundRect) ctx.roundRect(lx,ly,tw+pad*2,th+pad*2,3); else ctx.rect(lx,ly,tw+pad*2,th+pad*2);
    ctx.fill();
    ctx.fillStyle=col; ctx.globalAlpha=0.92; ctx.textAlign='left';
    ctx.fillText(p.name,lx+pad,ly+pad+th/2);
    ctx.globalAlpha=1;
  }
  ctx.restore();
}

function renderCanvas(canvas, con, mode, showLabels=false){
  const ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  const starField = mode==='stars'||mode==='reveal';
  drawBackground(ctx, W, H, con, starField);
  const proj=projectStars(con.stars, W, H);
  if(mode==='diagram'||mode==='reveal') drawLines(ctx, proj, con);
  drawStars(ctx, proj);
  if(mode==='reveal'||showLabels) drawLabels(ctx, proj, W);
}

// ═══════════════════════════════════════════════════════════
// ARTWORK MODE
// ═══════════════════════════════════════════════════════════

// Solve best-fit similarity transform (uniform scale + rotation + translation,
// no shear/skew) from n src points to n dst points via least squares.
// Returns [a,b,c,d,e,f] for ctx.setTransform(a,b,c,d,e,f)
// where the transform is: x'= a*x - b*y + e,  y'= b*x + a*y + f
function solveSimilarity(src, dst){
  const n=src.length;
  const sx=src.reduce((s,p)=>s+p[0],0)/n, sy=src.reduce((s,p)=>s+p[1],0)/n;
  const dx=dst.reduce((s,p)=>s+p[0],0)/n, dy=dst.reduce((s,p)=>s+p[1],0)/n;
  // Work in centred coordinates
  const sc=src.map(p=>[p[0]-sx,p[1]-sy]);
  const dc=dst.map(p=>[p[0]-dx,p[1]-dy]);
  let num_a=0, num_b=0, denom=0;
  for(let i=0;i<n;i++){
    num_a += sc[i][0]*dc[i][0] + sc[i][1]*dc[i][1];
    num_b += sc[i][0]*dc[i][1] - sc[i][1]*dc[i][0];
    denom += sc[i][0]*sc[i][0] + sc[i][1]*sc[i][1];
  }
  const a=num_a/denom, b=num_b/denom;
  // Translation: maps centroid of src to centroid of dst
  const e=dx - a*sx + b*sy;
  const f=dy - b*sx - a*sy;
  return [a,b,-b,a,e,f];
}

// Multiply two canvas transforms [a,b,c,d,e,f] (A applied after B).
function matMul(A,B){
  const [a1,b1,c1,d1,e1,f1]=A,[a2,b2,c2,d2,e2,f2]=B;
  return [a1*a2+c1*b2,b1*a2+d1*b2,a1*c2+c1*d2,b1*c2+d1*d2,a1*e2+c1*f2+e1,b1*e2+d1*f2+f1];
}

// Build a tweak transform: rotate+scale around (cx,cy) then translate (dx,dy).
function makeTweak(cx,cy,angleDeg,scl,dx,dy){
  const θ=angleDeg*Math.PI/180,c=Math.cos(θ),s=Math.sin(θ);
  return [c*scl,s*scl,-s*scl,c*scl,scl*(-c*cx+s*cy)+cx+dx,scl*(-s*cx-c*cy)+cy+dy];
}

// Per-constellation artwork corrections applied on top of solveSimilarity.
// flipH/flipV: mirror in canvas space around anchor centroid.
// angle(°), scale(×), dx/dy: fraction of canvas W (to stay resolution-independent).
const ART_CORRECTIONS = {
  UMi: {flipV:true, angle:55, scale:1.13, dx:-126/600, dy:-32/600},
};

const artCache={};  // abbr -> HTMLImageElement | 'loading' | 'error'

// showArtworkMode: overlay artwork on top of whatever is already on the canvas.
// showLabels=true draws star name labels after the artwork is composited.
function showArtworkMode(canvas, con, showLabels=false){
  const art=ART[con.abbr];
  if(!art) return;

  if(artCache[con.abbr] instanceof HTMLImageElement){
    drawArtwork(canvas, con, artCache[con.abbr], showLabels);
    return;
  }
  if(artCache[con.abbr]==='loading'||artCache[con.abbr]==='error') return;

  artCache[con.abbr]='loading';
  const img=new Image();
  img.crossOrigin='anonymous';
  img.onload=()=>{
    artCache[con.abbr]=img;
    if(session.pool[session.idx]===con && session.answered)
      drawArtwork(canvas, con, img, showLabels);
  };
  img.onerror=()=>{ artCache[con.abbr]='error'; };
  img.src=art.url;
}

// drawArtwork: composites the artwork image over the existing canvas content.
function drawArtwork(canvas, con, img, showLabels=false){
  const ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  const art=ART[con.abbr];

  const proj=getProjection(con.stars,W,H);
  const canvasPts=art.anchors.map(a=>projectPoint(a.ra,a.dec,proj));
  const iw=img.naturalWidth, ih=img.naturalHeight;
  const imgPts=art.anchors.map(a=>[a.px*iw, a.py*ih]);
  const dstPts=canvasPts.map(p=>[p.x,p.y]);

  let xform = solveSimilarity(imgPts,dstPts);

  const corr = ART_CORRECTIONS[con.abbr];
  if(corr){
    const cx=dstPts.reduce((s,p)=>s+p[0],0)/dstPts.length;
    const cy=dstPts.reduce((s,p)=>s+p[1],0)/dstPts.length;
    let flip=[1,0,0,1,0,0];
    if(corr.flipH) flip=matMul(flip,[-1,0,0,1,2*cx,0]);
    if(corr.flipV) flip=matMul(flip,[1,0,0,-1,0,2*cy]);
    const tweak=makeTweak(cx,cy,corr.angle||0,corr.scale||1,(corr.dx||0)*W,(corr.dy||0)*W);
    xform=matMul(tweak,matMul(flip,xform));
  }

  ctx.save();
  ctx.setTransform(...xform);
  ctx.globalAlpha=0.30;
  ctx.drawImage(img,0,0,iw,ih);
  ctx.restore();

  if(showLabels){
    const starProj=projectStars(con.stars,W,H);
    drawLabels(ctx,starProj,W);
  }

  ctx.save();
  ctx.font=`${Math.max(9,Math.round(W*0.026))}px system-ui,sans-serif`;
  ctx.fillStyle='rgba(255,255,255,0.22)';
  ctx.textAlign='right';
  ctx.fillText('Art: Johan Meuris / Free Art Licence',W-8,H-8);
  ctx.restore();
}

function showPhotoMode(con){
  const canvas = document.getElementById('quiz-canvas');
  const box    = document.getElementById('photo-box');
  const img    = document.getElementById('photo-img');
  const msg    = document.getElementById('photo-msg');

  canvas.style.display='none';
  box.classList.add('show');
  msg.style.display='none';
  img.classList.add('show');
  img.src = photoUrl(con);
}

function revealPhotoMode(con){
  const photoImg = document.getElementById('photo-img');
  const box      = document.getElementById('photo-box');
  const canvas   = document.getElementById('quiz-canvas');
  const ctx      = canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;

  // Move photo onto canvas so we can draw over it
  box.classList.remove('show');
  photoImg.classList.remove('show');
  canvas.style.display='block';

  ctx.drawImage(photoImg, 0, 0, W, H);

  const proj = projectStarsTAN(con.stars, con, W, H);
  drawLines(ctx, proj, con);
  drawStars(ctx, proj);
  drawLabels(ctx, proj, W);
}

// ═══════════════════════════════════════════════════════════
// QUIZ STATE
// ═══════════════════════════════════════════════════════════
let settings={mode:'diagram', diff:'1', hem:'B'};
let session={pool:[], idx:0, correct:0, answered:false};

function buildPool(){
  const maxD=parseInt(settings.diff), hem=settings.hem;
  return C.filter(c=>{
    if(c.stars.length===0) return false;
    if(c.diff>maxD) return false;
    if(hem==='N'&&c.hem==='S') return false;
    if(hem==='S'&&c.hem==='N') return false;
    return true;
  }).sort(()=>Math.random()-.5);
}

function getDistractors(correct, pool){
  const others=pool.filter(c=>c!==correct).sort(()=>Math.random()-.5);
  const same=others.filter(c=>c.diff===correct.diff);
  const rest=others.filter(c=>c.diff!==correct.diff);
  return [...same,...rest].slice(0,3);
}

function startQuiz(){
  session.pool=buildPool();
  session.idx=0;
  session.correct=0;
  session.answered=false;
  if(session.pool.length===0){
    alert('No constellations match those settings. Try broader options.');
    return;
  }
  showScreen('quiz');
  showQuestion();
}

function showQuestion(){
  const con=session.pool[session.idx];
  session.answered=false;

  const total=session.pool.length;
  document.getElementById('hud-progress').textContent=`${session.idx+1} / ${total}`;
  document.getElementById('hud-score').textContent=`${session.correct} correct`;
  document.getElementById('prog-fill').style.width=`${(session.idx/total)*100}%`;

  const canvas=document.getElementById('quiz-canvas');
  const box=document.getElementById('photo-box');
  box.classList.remove('show');
  document.getElementById('photo-img').classList.remove('show');
  canvas.style.display='block';

  const sz=document.getElementById('canvas-wrap').offsetWidth;
  canvas.width=canvas.height=sz*(window.devicePixelRatio||1);

  if(settings.mode==='photo'){
    showPhotoMode(con);
  } else {
    renderCanvas(canvas, con, settings.mode);
  }

  const wrongs=getDistractors(con, session.pool);
  const choices=[con,...wrongs].sort(()=>Math.random()-.5);
  const grid=document.getElementById('ans-grid');
  grid.innerHTML='';
  choices.forEach(c=>{
    const btn=document.createElement('button');
    btn.className='ans-btn';
    btn.textContent=c.name;
    btn.addEventListener('click',()=>handleAnswer(c,con));
    grid.appendChild(btn);
  });

  document.getElementById('feedback').textContent='';
  document.getElementById('btn-next').classList.remove('show');
}

function handleAnswer(chosen, correct){
  if(session.answered) return;
  session.answered=true;

  document.querySelectorAll('.ans-btn').forEach(b=>{
    b.disabled=true;
    if(b.textContent===correct.name) b.classList.add('ok');
    else if(b.textContent===chosen.name&&chosen!==correct) b.classList.add('err');
  });

  if(chosen===correct){
    session.correct++;
    document.getElementById('hud-score').textContent=`${session.correct} correct`;
    document.getElementById('feedback').textContent=`✓ Correct! — ${correct.abbr}, ${correct.hem==='N'?'Northern':correct.hem==='S'?'Southern':'Equatorial'}`;
  } else {
    document.getElementById('feedback').textContent=`✗ That was ${correct.name} (${correct.abbr})`;
  }

  // Reveal: show lines + star labels + artwork overlay
  const canvas=document.getElementById('quiz-canvas');
  if(settings.mode==='stars'){
    renderCanvas(canvas, correct, 'reveal');
    showArtworkMode(canvas, correct, true);
  } else if(settings.mode==='diagram'){
    renderCanvas(canvas, correct, 'diagram', true);
    showArtworkMode(canvas, correct, true);
  } else if(settings.mode==='photo'){
    revealPhotoMode(correct);
  }

  document.getElementById('btn-next').classList.add('show');
}

function nextQuestion(){
  session.idx++;
  if(session.idx>=session.pool.length) showResults();
  else showQuestion();
}

function showResults(){
  const total=session.pool.length;
  const pct=session.correct/total;
  document.getElementById('res-score').textContent=`${session.correct} / ${total}`;
  let grade,stars;
  if(pct>=.9){grade='Astronomer';stars='★★★';}
  else if(pct>=.7){grade='Sky Watcher';stars='★★☆';}
  else if(pct>=.5){grade='Stargazer';stars='★☆☆';}
  else{grade='Keep Practicing';stars='☆☆☆';}
  document.getElementById('res-grade').textContent=grade;
  document.getElementById('res-stars').textContent=stars;
  showScreen('result');
}

// ═══════════════════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════════════════
function showScreen(n){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+n).classList.add('active');
}

function initPills(id,key){
  document.getElementById(id).querySelectorAll('.pill').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.getElementById(id).querySelectorAll('.pill').forEach(b=>b.classList.remove('on'));
      btn.classList.add('on');
      settings[key]=btn.dataset.val;
      updateCount();
    });
  });
}

function updateCount(){
  const n=buildPool().length;
  document.getElementById('btn-start').textContent=`Start Quiz (${n} constellations) ›`;
}

document.addEventListener('DOMContentLoaded',()=>{
  initPills('mode-group','mode');
  initPills('diff-group','diff');
  initPills('hem-group','hem');
  updateCount();

  document.getElementById('btn-start').addEventListener('click',startQuiz);
  document.getElementById('btn-next').addEventListener('click',nextQuestion);
  document.getElementById('btn-again').addEventListener('click',startQuiz);
  document.getElementById('btn-settings').addEventListener('click',()=>showScreen('start'));

  document.addEventListener('keydown',e=>{
    if(!document.getElementById('screen-quiz').classList.contains('active')) return;
    const btns=[...document.querySelectorAll('.ans-btn')];
    const idx={'1':0,'2':1,'3':2,'4':3}[e.key];
    if(idx!==undefined&&btns[idx]&&!btns[idx].disabled) btns[idx].click();
    if((e.key==='Enter'||e.key===' ')&&document.getElementById('btn-next').classList.contains('show'))
      document.getElementById('btn-next').click();
  });
});
</script>
</body>
</html>
