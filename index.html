<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Constellate</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/quiz.css">
  <link rel="stylesheet" href="css/explore.css">
  <link rel="stylesheet" href="css/course.css">
</head>

<body>
  <div id="app">

    <div id="screen-start" class="screen active">
      <div class="screen-body">
        <div class="course-header">
          <h1>✦ Constellate</h1>
          <div class="viewer-row">
            <div id="viewer-search">
              <input type="text" id="con-search-input" list="con-search-list" placeholder="Find constellation…" autocomplete="off">
              <datalist id="con-search-list"></datalist>
              <button id="btn-view">View ›</button>
            </div>
            <button id="btn-explore-free">Sky Explorer ›</button>
          </div>
        </div>
        <div id="course-hero">
          <button id="btn-continue">Start Learning ›</button>
          <div id="course-progress-wrap"><div id="course-progress-bar"></div></div>
          <div id="course-progress-label"></div>
        </div>
        <div id="course-map"></div>
        <div style="text-align:center;padding:16px 0 8px">
          <button id="btn-reset-progress" style="font-size:.7rem;padding:4px 10px;border:1px solid #555;background:transparent;color:#666;border-radius:6px;cursor:pointer">⚠ Reset all progress</button>
        </div>
      </div>
    </div>

    <div id="screen-quiz" class="screen">
      <div id="quiz-hdr">
        <div id="quiz-hdr-row">
          <div id="quiz-breadcrumb" style="display:none">
            <a href="#" id="quiz-breadcrumb-course">Course</a> › <span id="quiz-breadcrumb-stage"></span>
          </div>
          <div id="viewer-select-row">
            <div id="viewer-search-inline">
              <input type="text" id="con-select-viewer-input" list="con-search-list" placeholder="Find constellation…" autocomplete="off">
              <button id="btn-viewer-go">View ›</button>
            </div>
          </div>
        </div>
        <div class="hud">
          <span id="hud-progress">1 / 10</span>
          <span class="hud-score" id="hud-score">0 correct</span>
          <button class="btn-quit" id="btn-quit">Quit</button>
        </div>
        <div class="prog-wrap">
          <div class="prog-fill" id="prog-fill" style="width:0%"></div>
        </div>
      </div>
      <div class="screen-body">
        <div id="canvas-area">
          <div id="canvas-wrap">
            <canvas id="quiz-canvas"></canvas>
            <div id="photo-box">
              <img id="photo-img" alt="Night sky photograph">
              <div id="photo-msg">Loading DSS sky photograph…</div>
            </div>
          </div>
          <div id="art-credit"></div>
        </div>
        <div id="quiz-label-area">
          <p class="q-label">What constellation is this?</p>
          <div id="reveal-controls">
            <label class="rev-chk" id="lbl-rev-photo"><input type="checkbox" id="chk-rev-photo" checked> Photo</label>
            <label class="rev-chk"><input type="checkbox" id="chk-rev-boundary" checked> Boundary</label>
            <label class="rev-chk"><input type="checkbox" id="chk-rev-diagram" checked> Diagram</label>
            <label class="rev-chk"><input type="checkbox" id="chk-rev-artwork" checked> Artwork</label>
          </div>
        </div>
        <div class="ans-grid" id="ans-grid"></div>
        <div id="autocomplete-area" style="display:none">
          <div id="autocomplete-input-row">
            <input type="text" id="quiz-autocomplete-input" list="con-search-list"
                   placeholder="Type constellation name…" autocomplete="off">
            <button id="quiz-autocomplete-submit">Check</button>
          </div>
          <div id="autocomplete-msg"></div>
        </div>
        <div id="feedback"></div>
      </div>
      <div class="nav-row screen-ftr">
        <button class="btn-prev" id="btn-prev">← Prev</button>
        <button class="btn-next" id="btn-next">Next →</button>
      </div>
    </div>

    <div id="screen-explore" class="screen">
      <div class="explore-hdr" id="explore-free-hdr">
        <nav class="find-breadcrumb">
          <a href="#" id="explore-breadcrumb-course">Course</a> › <span>Sky Explorer</span>
        </nav>
        <div id="explore-search">
          <input type="text" id="explore-search-input" list="explore-con-list" placeholder="Find constellation…" autocomplete="off">
          <datalist id="explore-con-list"></datalist>
          <button id="explore-search-go">Go</button>
        </div>
      </div>
      <div id="find-quiz-hdr" style="display:none">
        <div class="find-breadcrumb" style="padding:2px 0 6px">
          <a href="#" id="breadcrumb-course">Course</a> › <span id="breadcrumb-stage"></span>
        </div>
        <div class="hud">
          <span id="find-hud-progress">1 / 12</span>
          <span class="hud-score" id="find-hud-score">0 correct</span>
          <button class="btn-quit" id="find-btn-quit">Quit</button>
        </div>
        <div class="prog-wrap">
          <div class="prog-fill" id="find-prog-fill" style="width:0%"></div>
        </div>
      </div>
      <div class="screen-body">
        <div class="explore-layers">
          <label class="rev-chk"><input type="checkbox" id="chk-ex-photo" checked> Photo</label>
          <label class="rev-chk"><input type="checkbox" id="chk-ex-stars" checked> Stars</label>
          <label class="rev-chk"><input type="checkbox" id="chk-ex-lines" checked> Lines</label>
          <label class="rev-chk"><input type="checkbox" id="chk-ex-starlabels" checked> Star names</label>
          <label class="rev-chk"><input type="checkbox" id="chk-ex-connames" checked> Con. names</label>
          <label class="rev-chk"><input type="checkbox" id="chk-ex-equator" checked> Equator</label>
          <label class="rev-chk"><input type="checkbox" id="chk-ex-bounds" checked> Bounds</label>
          <label class="rev-chk"><input type="checkbox" id="chk-ex-art" checked> Art</label>
          <label class="rev-chk" style="display:none"><input type="checkbox" id="chk-ex-phototiles"> Tiles</label>
        </div>
        <div id="explore-area">
          <div id="explore-wrap">
            <canvas id="explore-gl-canvas"></canvas>
            <canvas id="explore-canvas"></canvas>
            <canvas id="annotation-canvas"></canvas>
          </div>
          <div id="explore-art-credit"></div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;padding:4px 8px">
          <div id="explore-roll-strip" style="flex:1;padding:4px;text-align:center;font-size:12px;color:#aaa;cursor:ew-resize;user-select:none;letter-spacing:0.05em">Rotate</div>
          <button id="btn-copy-view" style="font-size:11px;padding:3px 8px;border:1px solid #555;background:transparent;color:#aaa;border-radius:4px;cursor:pointer;white-space:nowrap">Copy View</button>
        </div>
        <div id="explore-readout" style="padding:2px 8px;font-size:11px;color:#666;font-family:monospace;text-align:center"></div>
        <div id="explore-quiz-bar" style="display:none">
          <button id="find-help-btn" style="display:none">? Help</button>
          <div id="eq-label-area">
            <p class="q-label" id="eq-prompt">Click on: <strong id="eq-target-name"></strong></p>
            <div id="eq-feedback"></div>
          </div>
          <div id="eq-score" style="display:none"></div>
          <div id="eq-reveal-controls" style="display:none">
            <label class="rev-chk"><input type="checkbox" id="chk-eq-photo" checked> Photo</label>
            <label class="rev-chk"><input type="checkbox" id="chk-eq-boundary" checked> Boundary</label>
            <label class="rev-chk"><input type="checkbox" id="chk-eq-diagram" checked> Diagram</label>
            <label class="rev-chk"><input type="checkbox" id="chk-eq-art" checked> Art</label>
          </div>
        </div>
      </div>
      <div class="nav-row screen-ftr" id="find-nav-row" style="display:none">
        <button class="btn-prev" id="find-btn-prev">← Prev</button>
        <button class="btn-next" id="eq-next">Next →</button>
      </div>
      <div id="find-guide-overlay" style="display:none">
        <div id="fg-info-row">
          <div id="fg-step-row">
            <div id="fg-step-dots"></div>
            <span id="fg-step-count"></span>
          </div>
          <button id="fg-back-btn">← Back to quiz</button>
        </div>
        <div id="fg-caption-label"></div>
        <p id="fg-caption-text"></p>
        <div id="fg-nav-row">
          <button id="fg-btn-prev">← Back</button>
          <button id="fg-btn-toggle-diag" style="display:none">Diagrams</button>
          <button id="fg-btn-next">Next →</button>
        </div>
      </div>
    </div>

    <div id="screen-result" class="screen">
      <div class="screen-body">
        <div class="result-wrap">
          <div class="result-num" id="res-score">0 / 0</div>
          <div class="result-sub">constellations identified correctly</div>
          <div class="result-grade" id="res-grade"></div>
          <div class="result-stars" id="res-stars"></div>
        </div>
        <div id="result-btns" style="display:flex;flex-direction:column;align-items:center;gap:12px"></div>
      </div>
    </div>

  </div>

  <div id="con-modal" class="modal-overlay" style="display:none">
    <div class="modal-card">
      <button class="modal-close" id="modal-close">✕</button>
      <h2 class="modal-title" id="modal-title"></h2>
      <p class="modal-body" id="modal-body"></p>
      <div class="modal-actions">
        <a class="modal-wiki-link" id="modal-wiki-link" href="#" target="_blank" rel="noopener">Wikipedia ↗</a>
        <button class="modal-explore-btn" id="modal-explore-btn">View in Explorer →</button>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/projection.js"></script>
  <script src="js/render.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/explore-gl.js"></script>
  <script src="js/explore.js"></script>
  <script src="js/guide-renderer.js"></script>
  <script src="js/find-guide.js"></script>
  <script src="js/course.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
