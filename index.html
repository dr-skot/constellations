<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Constellate</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/quiz.css">
  <link rel="stylesheet" href="css/explore.css">
  <link rel="stylesheet" href="css/course.css">
</head>

<body>
  <div id="app">

    <div id="screen-start" class="screen active">
      <div class="course-header">
        <h1>✦ Constellate</h1>
        <div class="viewer-row">
          <select id="con-select"></select>
          <button id="btn-view">View ›</button>
          <button id="btn-explore-free">Sky Explorer ›</button>
        </div>
      </div>
      <div id="course-map"></div>
    </div>

    <div id="screen-quiz" class="screen">
      <div>
        <div class="hud">
          <span id="hud-progress">1 / 10</span>
          <span class="hud-score" id="hud-score">0 correct</span>
          <button id="btn-quit">Quit</button>
        </div>
        <div class="prog-wrap">
          <div class="prog-fill" id="prog-fill" style="width:0%"></div>
        </div>
      </div>
      <div id="canvas-area">
        <div id="canvas-wrap">
          <canvas id="quiz-canvas"></canvas>
          <div id="photo-box">
            <img id="photo-img" alt="Night sky photograph">
            <div id="photo-msg">Loading DSS sky photograph…</div>
          </div>
        </div>
        <div id="art-credit"></div>
      </div>
      <p class="q-label">What constellation is this?</p>
      <div class="ans-grid" id="ans-grid"></div>
      <div id="feedback"></div>
      <div id="reveal-controls">
        <label class="rev-chk" id="lbl-rev-photo"><input type="checkbox" id="chk-rev-photo"> Photo</label>
        <label class="rev-chk"><input type="checkbox" id="chk-rev-boundary" checked> Boundary</label>
        <label class="rev-chk"><input type="checkbox" id="chk-rev-diagram" checked> Diagram</label>
        <label class="rev-chk"><input type="checkbox" id="chk-rev-artwork" checked> Artwork</label>
      </div>
      <div id="viewer-select-row"><select id="con-select-viewer"></select></div>
      <div id="viewer-tweak">
        <div class="tweak-row">
          <label>Scale <span class="tweak-val" id="tweak-scale-val">1.00×</span></label>
          <input type="range" id="tweak-scale" min="25" max="400" value="100" step="1">
        </div>
        <div class="tweak-row">
          <label>X <span class="tweak-val" id="tweak-dx-val">0.0°</span></label>
          <input type="range" id="tweak-dx" min="-45" max="45" value="0" step="0.5">
        </div>
        <div class="tweak-row">
          <label>Y <span class="tweak-val" id="tweak-dy-val">0.0°</span></label>
          <input type="range" id="tweak-dy" min="-45" max="45" value="0" step="0.5">
        </div>
        <div style="text-align:center;margin-top:6px">
          <button id="btn-copy-framing">Copy ra/dec/fov</button>
        </div>
      </div>
      <div class="nav-row">
        <button class="btn-prev" id="btn-prev">← Prev</button>
        <button class="btn-next" id="btn-next">Next →</button>
      </div>
    </div>

    <div id="screen-explore" class="screen">
      <div class="explore-hdr" id="explore-free-hdr">
        <span style="color:var(--dim);font-size:.75rem;letter-spacing:.15em;text-transform:uppercase">Sky Explorer</span>
        <div id="explore-search">
          <input type="text" id="explore-search-input" list="explore-con-list" placeholder="Find constellation…" autocomplete="off">
          <datalist id="explore-con-list"></datalist>
          <button id="explore-search-go">Go</button>
        </div>
      </div>
      <div class="explore-hdr" id="find-quiz-hdr" style="display:none">
        <nav class="find-breadcrumb">
          <a href="#" id="breadcrumb-course">Course</a> › <span id="breadcrumb-stage"></span>
        </nav>
      </div>
      <div id="explore-quiz-bar" style="display:none">
        <div class="eq-prompt">Click on: <strong id="eq-target-name"></strong></div>
        <div class="eq-feedback" id="eq-feedback"></div>
        <div class="eq-score" id="eq-score">0 / 0</div>
        <button class="btn-eq-next" id="eq-next" style="display:none">Next →</button>
      </div>
      <div class="explore-layers">
        <label class="rev-chk"><input type="checkbox" id="chk-ex-photo" checked> Photo</label>
        <label class="rev-chk"><input type="checkbox" id="chk-ex-diagram" checked> Diagram</label>
        <label class="rev-chk"><input type="checkbox" id="chk-ex-starlabels" checked> Star names</label>
        <label class="rev-chk"><input type="checkbox" id="chk-ex-connames" checked> Con. names</label>
        <label class="rev-chk"><input type="checkbox" id="chk-ex-equator" checked> Equator</label>
        <label class="rev-chk"><input type="checkbox" id="chk-ex-bounds" checked> Bounds</label>
        <label class="rev-chk"><input type="checkbox" id="chk-ex-art" checked> Art</label>
      </div>
      <div id="explore-area">
        <div id="explore-wrap">
          <canvas id="explore-canvas"></canvas>
        </div>
        <div id="explore-art-credit"></div>
      </div>
    </div>

    <div id="screen-result" class="screen">
      <div class="result-wrap">
        <div class="result-num" id="res-score">0 / 0</div>
        <div class="result-sub">constellations identified correctly</div>
        <div class="result-grade" id="res-grade"></div>
        <div class="result-stars" id="res-stars"></div>
      </div>
      <div id="result-btns" style="display:flex;flex-direction:column;align-items:center;gap:12px"></div>
    </div>

  </div>

  <div id="con-modal" class="modal-overlay" style="display:none">
    <div class="modal-card">
      <button class="modal-close" id="modal-close">✕</button>
      <h2 class="modal-title" id="modal-title"></h2>
      <p class="modal-body" id="modal-body"></p>
      <div class="modal-actions">
        <a class="modal-wiki-link" id="modal-wiki-link" href="#" target="_blank" rel="noopener">Wikipedia ↗</a>
        <button class="modal-explore-btn" id="modal-explore-btn">View in Explorer →</button>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/projection.js"></script>
  <script src="js/render.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/explore.js"></script>
  <script src="js/course.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
