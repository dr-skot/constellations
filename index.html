    };

    // ═══════════════════════════════════════════════════════════
    // UTILITIES
    // ═══════════════════════════════════════════════════════════
    function hashStr(s) { let h = 0; for (let i = 0; i < s.length; i++)h = (Math.imul(31, h) + s.charCodeAt(i)) | 0; return h >>> 0 }
    function makeRng(seed) { let s = seed; return () => { s = (s * 1664525 + 1013904223) >>> 0; return s / 4294967296 } }
    function magToR(m) { return m <= -1 ? 7 : m < 0 ? 6 : m < 1 ? 5 : m < 2 ? 3.8 : m < 3 ? 2.8 : m < 4 ? 2.0 : m < 5 ? 1.4 : 1.0 }
    function starCol(h) { return h === 'r' ? '#ff7060' : h === 'o' ? '#ffb860' : h === 'b' ? '#90c8ff' : '#f5eedc' }

    function photoUrl(con) {
      return `img/${con.abbr}.jpg`;
    }

    // ═══════════════════════════════════════════════════════════
    // EXPLORE MODE
    // ═══════════════════════════════════════════════════════════
    const explorePhotoCache = {};
    let explore = { ra: 80, dec: 5, fov: 60, drag: null, quiz: null };
    let exploreDragMoved = false;

    function angularDist(ra1, dec1, ra2, dec2) {
      const toR = Math.PI / 180;
      const d1 = dec1 * toR, d2 = dec2 * toR;
      const cos_c = Math.sin(d1) * Math.sin(d2) +
        Math.cos(d1) * Math.cos(d2) * Math.cos((ra2 - ra1) * toR);
      return Math.acos(Math.max(-1, Math.min(1, cos_c))) * 180 / Math.PI;
    }

    function exploreVisibleCons() {
      return C.filter(con =>
        angularDist(explore.ra, explore.dec, con.ra, con.dec) < explore.fov / 2 + con.fov / 2 + 8
      );
    }

    function loadExplorePhoto(con) {
      if (explorePhotoCache[con.abbr]) return;
      explorePhotoCache[con.abbr] = 'loading';
      const img = new Image();
      img.onload = () => {
        explorePhotoCache[con.abbr] = img;
        if (document.getElementById('screen-explore').classList.contains('active')) drawExplore();
      };
      img.onerror = () => { explorePhotoCache[con.abbr] = 'error'; };
      img.src = photoUrl(con);
    }

    // Draw one triangle of a source image at a destination triangle, using affine + clip.
    function drawImageTriangle(ctx, img, src, dst) {
      const cross = (dst[1][0] - dst[0][0]) * (dst[2][1] - dst[0][1])
                  - (dst[1][1] - dst[0][1]) * (dst[2][0] - dst[0][0]);
      if (Math.abs(cross) < 0.5) return; // degenerate
      const xform = solveAffine(src, dst);
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(dst[0][0], dst[0][1]);
      ctx.lineTo(dst[1][0], dst[1][1]);
      ctx.lineTo(dst[2][0], dst[2][1]);
      ctx.closePath();
      ctx.clip();
      ctx.setTransform(...xform);
      ctx.drawImage(img, 0, 0, img.naturalWidth, img.naturalHeight);
      ctx.restore();
    }

    function drawExplorePhotoLayer(ctx, con, viewCon, W, H) {
      const img = explorePhotoCache[con.abbr];
      if (!(img instanceof HTMLImageElement)) { loadExplorePhoto(con); return; }

      // Subdivide the photo into a GRID×GRID mesh. For each vertex compute the
      // exact sky position (via TAN inverse of the photo projection) then re-project
      // into the explore canvas. Each cell is drawn as 2 affine-warped triangles.
      const GRID = 8, IW = 640, IH = 640;
      const gw = GRID + 1;
      const verts = new Array(gw * gw);
      for (let gy = 0; gy <= GRID; gy++) {
        for (let gx = 0; gx <= GRID; gx++) {
          const px = gx / GRID * IW, py = gy / GRID * IH;
          const rd = pixelToRADec(px, py, con.ra, con.dec, con.fov, IW, IH);
          const ep = projectStarsTAN([[rd.ra, rd.dec, 0]], viewCon, W, H)[0];
          verts[gy * gw + gx] = ep.d > 0 ? [px, py, ep.x, ep.y] : null;
        }
      }
      for (let gy = 0; gy < GRID; gy++) {
        for (let gx = 0; gx < GRID; gx++) {
          const p00 = verts[gy * gw + gx];
          const p10 = verts[gy * gw + gx + 1];
          const p01 = verts[(gy + 1) * gw + gx];
          const p11 = verts[(gy + 1) * gw + gx + 1];
          if (p00 && p10 && p01)
            drawImageTriangle(ctx, img,
              [[p00[0], p00[1]], [p10[0], p10[1]], [p01[0], p01[1]]],
              [[p00[2], p00[3]], [p10[2], p10[3]], [p01[2], p01[3]]]);
          if (p10 && p11 && p01)
            drawImageTriangle(ctx, img,
              [[p10[0], p10[1]], [p11[0], p11[1]], [p01[0], p01[1]]],
              [[p10[2], p10[3]], [p11[2], p11[3]], [p01[2], p01[3]]]);
        }
      }
    }

    function drawExploreArtLayer(ctx, con, viewCon, W, H) {
      const art = ART[con.abbr];
      if (!art || art.anchors.length < 3) return;
      if (!artCache[con.abbr]) {
        artCache[con.abbr] = 'loading';
        const img = new Image();
        img.onload = () => {
          artCache[con.abbr] = img;
          if (document.getElementById('screen-explore').classList.contains('active')) drawExplore();
        };
        img.onerror = () => { artCache[con.abbr] = 'error'; };
        img.src = art.url;
      }
      const img = artCache[con.abbr];
      if (!(img instanceof HTMLImageElement)) return;
      const iw = img.naturalWidth, ih = img.naturalHeight;

      // Map art pixels through the constellation's own fixed TAN projection
      // (ref canvas) as a stable intermediate, then invert to RA/Dec and
      // re-project into the explore view. This matches each pixel to the same
      // sky position regardless of where the explore view is pointing.
      const REF = 1000;
      const refPts = projectStarsTAN(art.anchors.map(a => [a.ra, a.dec, 0]), con, REF, REF);
      const artToRef = solveAffine(
        art.anchors.map(a => [a.px * iw, a.py * ih]),
        refPts.map(p => [p.x, p.y])
      );

      const GRID = 8, gw = GRID + 1;
      const verts = new Array(gw * gw);
      for (let gy = 0; gy <= GRID; gy++) {
        for (let gx = 0; gx <= GRID; gx++) {
          const px = gx / GRID * iw, py = gy / GRID * ih;
          const qx = artToRef[0] * px + artToRef[2] * py + artToRef[4];
          const qy = artToRef[1] * px + artToRef[3] * py + artToRef[5];
          const rd = pixelToRADec(qx, qy, con.ra, con.dec, con.fov, REF, REF);
          const ep = projectStarsTAN([[rd.ra, rd.dec, 0]], viewCon, W, H)[0];
          verts[gy * gw + gx] = ep.d > 0 ? [px, py, ep.x, ep.y] : null;
        }
      }

      ctx.save();
      ctx.globalAlpha = 0.5;
      ctx.globalCompositeOperation = 'screen';
      for (let gy = 0; gy < GRID; gy++) {
        for (let gx = 0; gx < GRID; gx++) {
          const p00 = verts[gy * gw + gx];
          const p10 = verts[gy * gw + gx + 1];
          const p01 = verts[(gy + 1) * gw + gx];
          const p11 = verts[(gy + 1) * gw + gx + 1];
          if (p00 && p10 && p01)
            drawImageTriangle(ctx, img,
              [[p00[0], p00[1]], [p10[0], p10[1]], [p01[0], p01[1]]],
              [[p00[2], p00[3]], [p10[2], p10[3]], [p01[2], p01[3]]]);
          if (p10 && p11 && p01)
            drawImageTriangle(ctx, img,
              [[p10[0], p10[1]], [p11[0], p11[1]], [p01[0], p01[1]]],
              [[p10[2], p10[3]], [p11[2], p11[3]], [p01[2], p01[3]]]);
        }
      }
      ctx.restore();

    }

    function drawExplore() {
      const canvas = document.getElementById('explore-canvas');
      if (!canvas) return;
      const wrap = document.getElementById('explore-wrap');
      const dpr = window.devicePixelRatio || 1;
      const sz = wrap.offsetWidth;
      const need = Math.round(sz * dpr);
      if (canvas.width !== need) canvas.width = canvas.height = need;
      const W = canvas.width, H = canvas.height;
      const ctx = canvas.getContext('2d');
      const viewCon = { ra: explore.ra, dec: explore.dec, fov: explore.fov };

      ctx.fillStyle = '#010208';
      ctx.fillRect(0, 0, W, H);

      const visible = exploreVisibleCons();
      const q = explore.quiz;
      const cm = q?.stageMode;  // course mode active?
      const showPhoto      = cm ? cm === 'photo'   : document.getElementById('chk-ex-photo').checked;
      const showDiag       = cm ? cm !== 'photo'   : document.getElementById('chk-ex-diagram').checked;
      const showLines      = cm ? cm === 'diagram' : true;
      const showBounds     = cm ? !!q.bounds       : document.getElementById('chk-ex-bounds').checked;
      const showArt        = cm ? false            : document.getElementById('chk-ex-art').checked;
      const showStarLabels = cm ? false            : document.getElementById('chk-ex-starlabels').checked;
      const showConNames   = cm ? false            : document.getElementById('chk-ex-connames').checked;
      const showEquator    = cm ? false            : document.getElementById('chk-ex-equator').checked;

      // Photo layer
      if (showPhoto) {
        for (const con of visible) {
          try { drawExplorePhotoLayer(ctx, con, viewCon, W, H); } catch (e) { }
        }
      }

      // Celestial equator
      if (showEquator) {
        const eqPts = [];
        for (let ra = 0; ra <= 360; ra += 0.5) eqPts.push([ra, 0, 0]);
        const pts = projectStarsTAN(eqPts, viewCon, W, H);
        ctx.save();
        ctx.strokeStyle = 'rgba(220,180,80,0.55)';
        ctx.lineWidth = Math.max(1, W / 640);
        ctx.setLineDash([6, 5]);
        ctx.beginPath();
        let penDown = false;
        for (const p of pts) {
          if (p.d <= 0) { penDown = false; continue; }
          if (!penDown) { ctx.moveTo(p.x, p.y); penDown = true; }
          else ctx.lineTo(p.x, p.y);
        }
        ctx.stroke();
        ctx.restore();
      }

      // Boundaries
      if (showBounds) {
        ctx.save();
        ctx.strokeStyle = 'rgba(120,200,120,0.45)';
        ctx.lineWidth = Math.max(1, W / 640);
        for (const con of visible) {
          const rings = BOUNDS[con.abbr];
          if (!rings) continue;
          for (const ring of rings) {
            const pts = projectStarsTAN(ring.map(([ra, dec]) => [ra, dec, 0]), viewCon, W, H);
            ctx.beginPath();
            let penDown = false;
            for (const p of pts) {
              if (p.d <= 0) { penDown = false; continue; }
              if (!penDown) { ctx.moveTo(p.x, p.y); penDown = true; }
              else ctx.lineTo(p.x, p.y);
            }
            ctx.stroke();
          }
        }
        ctx.restore();
      }

      // Diagram: stars + lines + constellation labels
      if (showDiag) {
        for (const con of visible) {
          const proj = projectStarsTAN(con.stars, viewCon, W, H)
            .map((p, i) => ({ ...p, _orig: con.stars[i] }))
            .filter(p => p.d > 0 && Math.abs(p.x - W / 2) < W * 1.5 && Math.abs(p.y - H / 2) < H * 1.5);
          if (con.lines && showLines) {
            const fullProj = projectStarsTAN(con.stars, viewCon, W, H)
              .map(p => p.d > 0 ? p : null);
            drawLines(ctx, fullProj, con);
          }
          drawStars(ctx, proj);
          if (showStarLabels) drawLabels(ctx, proj, W);
          // Constellation name label near center
          if (showConNames) {
            const cp = projectStarsTAN([[con.ra, con.dec, 99]], viewCon, W, H)[0];
            if (cp.x > 0 && cp.x < W && cp.y > 0 && cp.y < H) {
              const fs = Math.max(9, Math.round(W * 0.02));
              ctx.save();
              ctx.font = `${fs}px system-ui,sans-serif`;
              ctx.fillStyle = 'rgba(160,185,255,0.6)';
              ctx.textAlign = 'center';
              ctx.textBaseline = 'middle';
              ctx.fillText(con.name, cp.x, cp.y);
              ctx.restore();
            }
          }
        }
      }

      // Artwork layer
      const exploreCredit = document.getElementById('explore-art-credit');
      if (showArt) {
        let hasArt = false;
        for (const con of visible) {
          if (ART[con.abbr]) { hasArt = true; try { drawExploreArtLayer(ctx, con, viewCon, W, H); } catch (e) { } }
        }
        if (exploreCredit) exploreCredit.textContent = hasArt ? 'Art: Johan Meuris / Free Art Licence' : '';
      } else {
        if (exploreCredit) exploreCredit.textContent = '';
      }

      // Quiz: highlight boundaries after answering
      if (explore.quiz && explore.quiz.answered) {
        const { target, clicked } = explore.quiz;
        const lw = Math.max(2, W / 320);
        const drawBoundary = (con, color) => {
          if (!BOUNDS[con.abbr]) return;
          // Must skip off-screen constellations. TAN projection maps points behind the
          // projection plane to extreme-but-finite coordinates that can fall within the
          // 2*W pen-up threshold, producing phantom outlines on the wrong side of the sky.
          if (angularDist(explore.ra, explore.dec, con.ra, con.dec) > explore.fov / 2 + con.fov / 2 + 10) return;
          ctx.save();
          ctx.strokeStyle = color;
          ctx.lineWidth = lw;
          for (const ring of BOUNDS[con.abbr]) {
            const pts = projectStarsTAN(ring.map(([ra, dec]) => [ra, dec, 0]), viewCon, W, H);
            ctx.beginPath();
            let penDown = false;
            for (const p of pts) {
              if (p.d <= 0) { penDown = false; continue; }
              if (!penDown) { ctx.moveTo(p.x, p.y); penDown = true; }
              else ctx.lineTo(p.x, p.y);
            }
            ctx.stroke();
          }
          ctx.restore();
        };
        if (clicked && clicked.abbr !== target.abbr) drawBoundary(clicked, 'rgba(255,80,80,0.9)');
        drawBoundary(target, 'rgba(100,255,100,0.9)');
      }
    }

    function pointInPolygon(ra, dec, poly) {
      // Ray-casting in RA/Dec space. RA is circular (0–360), so we normalize all
      // polygon vertices to within ±180° of the test point before testing. Without
      // this, a polygon near RA=0 (vertices spanning e.g. 350°–10°) would be split
      // across the 0/360 seam and the ray would miss it.
      //
      // NOTE: always pre-filter by angular distance before calling this. The RA
      // normalization maps far-away polygon vertices to large-but-finite RA values,
      // and the rightward ray from the test point can cross those phantom vertices,
      // producing false positives for constellations on the opposite side of the sky.
      const norm = poly.map(([r, d]) => {
        let dr = r - ra;
        if (dr > 180) dr -= 360;
        if (dr < -180) dr += 360;
        return [ra + dr, d];
      });
      let inside = false;
      for (let i = 0, j = norm.length - 1; i < norm.length; j = i++) {
        const [xi, yi] = norm[i], [xj, yj] = norm[j];
        if (((yi > dec) !== (yj > dec)) && ra < (xj - xi) * (dec - yi) / (yj - yi) + xi)
          inside = !inside;
      }
      return inside;
    }

    function startExploreQuiz() {
      const pool = C.filter(c => BOUNDS[c.abbr]).sort(() => Math.random() - 0.5);
      explore.quiz = { pool, idx: 0, score: 0, total: 0, target: null, answered: false };
      document.getElementById('explore-quiz-bar').style.display = 'flex';
      document.getElementById('chk-ex-bounds').checked = true;
      localStorage.setItem('chk-ex-bounds', '1');
      nextExploreQuestion();
    }

    function stopExploreQuiz() {
      explore.quiz = null;
      document.getElementById('explore-quiz-bar').style.display = 'none';
      document.querySelector('.explore-layers').style.display = '';
      drawExplore();
    }

    function nextExploreQuestion() {
      const q = explore.quiz;
      if (q.idx >= q.pool.length) {
        if (q.courseStageIdx != null) { endFindCourseStage(); return; }
        q.pool.sort(() => Math.random() - 0.5);
        q.idx = 0;
      }
      q.target = q.pool[q.idx++];
      q.answered = false;
      document.getElementById('eq-target-name').textContent = q.target.name;
      document.getElementById('eq-score').textContent = `${q.score} / ${q.total}`;
      document.getElementById('eq-feedback').textContent = '';
      document.getElementById('eq-feedback').className = 'eq-feedback';
      document.getElementById('eq-next').style.display = 'none';
      drawExplore();
    }

    function handleExploreClick(px, py) {
      const q = explore.quiz;
      if (!q || q.answered) return;
      const canvas = document.getElementById('explore-canvas');
      const W = canvas.width, H = canvas.height;
      const coords = pixelToRADec(px, py, explore.ra, explore.dec, explore.fov, W, H);
      // Pre-filter by angular distance before pointInPolygon — see comment there.
      const clicked = C.find(c => BOUNDS[c.abbr] &&
        angularDist(coords.ra, coords.dec, c.ra, c.dec) < 60 &&
        BOUNDS[c.abbr].some(ring => pointInPolygon(coords.ra, coords.dec, ring))) || null;
      const correct = clicked && clicked.abbr === q.target.abbr;
      q.answered = true;
      q.clicked = clicked;
      q.total++;
      if (correct) q.score++;
      const fb = document.getElementById('eq-feedback');
      fb.textContent = correct ? '✓ Correct!' : clicked ? `✗ Nope, that's ${clicked.name}` : '✗ Missed';
      fb.className = 'eq-feedback ' + (correct ? 'correct' : 'wrong');
      document.getElementById('eq-score').textContent = `${q.score} / ${q.total}`;
      document.getElementById('eq-next').style.display = '';
      drawExplore();
    }

    function initExplore() {
      drawExplore();
    }

    // Project stars onto a TAN (gnomonic) image — same projection as photoUrl.
    // East is left, north is up, center = (con.ra, con.dec), full width = con.fov degrees.
    function projectStarsTAN(stars, con, W, H) {
      const ra0 = con.ra * Math.PI / 180, dec0 = con.dec * Math.PI / 180;
      const scale = (W / 2) / Math.tan(con.fov * Math.PI / 360);
      return stars.map(s => {
        const ra = s[0] * Math.PI / 180, dec = s[1] * Math.PI / 180;
        const d = Math.sin(dec0) * Math.sin(dec) + Math.cos(dec0) * Math.cos(dec) * Math.cos(ra - ra0);
        const xi = Math.cos(dec) * Math.sin(ra - ra0) / d;
        const eta = (Math.cos(dec0) * Math.sin(dec) - Math.sin(dec0) * Math.cos(dec) * Math.cos(ra - ra0)) / d;
        // d > 0: point is in front of projection plane; d ≤ 0: behind (>90° away),
        // coords are invalid — dividing by negative d flips signs and can produce
        // coordinates that accidentally land on screen, causing phantom draws.
        return { x: W / 2 - xi * scale, y: H / 2 - eta * scale, d, mag: s[2], hint: s[3], name: s[4] };
      });
    }

    // Inverse TAN (gnomonic) projection: canvas pixel → RA/Dec
    function pixelToRADec(px, py, ra0, dec0, fov, W, H) {
      const scale = (W / 2) / Math.tan(fov * Math.PI / 360);
      const xi = (W / 2 - px) / scale;
      const eta = (H / 2 - py) / scale;
      const ra0r = ra0 * Math.PI / 180, dec0r = dec0 * Math.PI / 180;
      const rho = Math.sqrt(xi * xi + eta * eta);
      if (rho < 1e-10) return { ra: ra0, dec: dec0 };
      const c = Math.atan(rho);
      const sinC = Math.sin(c), cosC = Math.cos(c);
      const sinD0 = Math.sin(dec0r), cosD0 = Math.cos(dec0r);
      const dec_r = Math.asin(Math.max(-1, Math.min(1, cosC * sinD0 + eta * sinC * cosD0 / rho)));
      const ra_r = ra0r + Math.atan2(xi * sinC, rho * cosD0 * cosC - eta * sinD0 * sinC);
      return { ra: ((ra_r * 180 / Math.PI) + 360) % 360, dec: dec_r * 180 / Math.PI };
    }

    function raDecToVec(ra, dec) {
      const r = ra * Math.PI / 180, d = dec * Math.PI / 180;
      return [Math.cos(d) * Math.cos(r), Math.cos(d) * Math.sin(r), Math.sin(d)];
    }
    function vecToRaDec(v) {
      return {
        ra: ((Math.atan2(v[1], v[0]) * 180 / Math.PI) + 360) % 360,
        dec: Math.asin(Math.max(-1, Math.min(1, v[2]))) * 180 / Math.PI
      };
    }
    function rotateByFromTo(c, from, to) {
      const dot = from[0]*to[0] + from[1]*to[1] + from[2]*to[2];
      const angle = Math.acos(Math.max(-1, Math.min(1, dot)));
      if (angle < 1e-10) return c;
      const ax = from[1]*to[2] - from[2]*to[1];
      const ay = from[2]*to[0] - from[0]*to[2];
      const az = from[0]*to[1] - from[1]*to[0];
      const len = Math.sqrt(ax*ax + ay*ay + az*az);
      if (len < 1e-10) return c;
      const [nx, ny, nz] = [ax/len, ay/len, az/len];
      const cos = Math.cos(angle), sin = Math.sin(angle);
      const d = nx*c[0] + ny*c[1] + nz*c[2];
      return [
        c[0]*cos + (ny*c[2] - nz*c[1])*sin + nx*d*(1-cos),
        c[1]*cos + (nz*c[0] - nx*c[2])*sin + ny*d*(1-cos),
        c[2]*cos + (nx*c[1] - ny*c[0])*sin + nz*d*(1-cos)
      ];
    }

    // ═══════════════════════════════════════════════════════════
    // PROJECTION  (RA/Dec → canvas x/y)
    // ═══════════════════════════════════════════════════════════

    // Compute projection parameters from a constellation's star array.
    // Returns {cRA, cDec, cosD, scale, wrapped} — reusable for any RA/Dec point.
    function getProjection(stars, W, H) {
      const PAD = 0.12;
      let ras = stars.map(s => s[0]);
      const wrapped = Math.max(...ras) - Math.min(...ras) > 180;
      if (wrapped) ras = ras.map(r => r < 180 ? r + 360 : r);
      const decs = stars.map(s => s[1]);
      const cRA = (Math.min(...ras) + Math.max(...ras)) / 2;
      const cDec = (Math.min(...decs) + Math.max(...decs)) / 2;
      const cosD = Math.cos(cDec * Math.PI / 180);
      const raSky = (Math.max(...ras) - Math.min(...ras)) * cosD;
      const decSp = Math.max(...decs) - Math.min(...decs);
      const scale = Math.max(raSky, decSp) / (1 - 2 * PAD) || 1;
      return { cRA, cDec, cosD, scale, wrapped, W, H };
    }

    // Project a single RA/Dec point using pre-computed projection params.
    function projectPoint(ra, dec, p) {
      let r = ra;
      if (p.wrapped && r < 180) r += 360;
      return {
        x: p.W / 2 + (p.cRA - r) * p.cosD / p.scale * p.W,
        y: p.H / 2 - (dec - p.cDec) / p.scale * p.H
      };
    }

    // Project all stars in a constellation to canvas coords.
    function projectStars(stars, W, H) {
      const p = getProjection(stars, W, H);
      return stars.map(s => ({ ...projectPoint(s[0], s[1], p), mag: s[2], hint: s[3], name: s[4] }));
    }

    // ═══════════════════════════════════════════════════════════
    // RENDERING
    // ═══════════════════════════════════════════════════════════

    function drawBackground(ctx, W, H, con, starField) {
      const bg = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.hypot(W, H) / 2);
      bg.addColorStop(0, '#0b0e1e'); bg.addColorStop(1, '#020408');
      ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
      if (!starField) return;
      const rng = makeRng(hashStr(con.name + '-bg'));
      ctx.save();
      for (let i = 0; i < 180; i++) {
        const bx = rng() * W, by = rng() * H, m = 3.8 + rng() * 3;
        const r = Math.max(.2, 1.2 - m * .15);
        ctx.globalAlpha = .12 + rng() * .45;
        ctx.fillStyle = rng() > .8 ? 'rgba(160,190,255,1)' : 'rgba(210,218,255,1)';
        ctx.beginPath(); ctx.arc(bx, by, r, 0, Math.PI * 2); ctx.fill();
      }
      ctx.globalAlpha = 1; ctx.restore();
    }

    function drawLines(ctx, proj, con) {
      ctx.save();
      ctx.strokeStyle = 'rgba(80,145,230,0.52)';
      ctx.lineWidth = 1.5;
      ctx.shadowColor = 'rgba(100,160,255,0.4)';
      ctx.shadowBlur = 5;
      for (const [i, j] of con.lines) {
        const a = proj[i], b = proj[j];
        if (!a || !b) continue;
        ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
      }
      ctx.restore();
    }

    function drawStars(ctx, proj) {
      for (const p of proj) {
        const r = magToR(p.mag), col = starCol(p.hint);
        if (p.mag < 2.5) {
          const gs = p.mag < 0 ? 26 : p.mag < 1 ? 18 : p.mag < 2 ? 13 : 8;
          const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, gs);
          const hx = col.replace('#', '');
          const ri = parseInt(hx.slice(0, 2), 16), gi = parseInt(hx.slice(2, 4), 16), bi = parseInt(hx.slice(4, 6), 16);
          grd.addColorStop(0, `rgba(${ri},${gi},${bi},0.28)`);
          grd.addColorStop(1, `rgba(${ri},${gi},${bi},0)`);
          ctx.fillStyle = grd;
          ctx.beginPath(); ctx.arc(p.x, p.y, gs, 0, Math.PI * 2); ctx.fill();
        }
        ctx.save();
        ctx.shadowColor = col; ctx.shadowBlur = p.mag < 2 ? 8 : p.mag < 3 ? 4 : 2;
        ctx.fillStyle = col;
        ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      }
    }

    function drawLabels(ctx, proj, W) {
      const fs = Math.max(10, Math.round(W * 0.036));
      ctx.save();
      ctx.font = `${fs}px system-ui,-apple-system,sans-serif`;
      ctx.textBaseline = 'middle';

      // Candidate offsets: [dx-fraction-of-label-width, dy-fraction-of-label-height]
      // relative to star edge; order = preference
      const H = W; // canvas is square
      const placed = []; // {x,y,w,h} of already-placed labels

      function overlaps(ax, ay, aw, ah) {
        for (const b of placed) {
          if (ax < b.x + b.w && ax + aw > b.x && ay < b.y + b.h && ay + ah > b.y) return true;
        }
        return false;
      }

      // Sort: brightest stars first so their labels get priority placement
      const named = [...proj].filter(p => p.name).sort((a, b) => a.mag - b.mag);

      let order = 0;
      for (const p of named) {
        order++;
        const col = starCol(p.hint), r = magToR(p.mag), pad = 3;
        const tw = ctx.measureText(p.name).width, th = fs;
        const lw = tw + pad * 2, lh = th + pad * 2;
        const gap = r + 5;

        // 8 candidate positions around the star (anchor = top-left of label box)
        const candidates = [
          [p.x + gap, p.y - lh / 2],  // right
          [p.x + gap, p.y - lh - gap / 2],  // upper-right
          [p.x + gap, p.y + gap / 2],  // lower-right
          [p.x - gap - lw, p.y - lh / 2],  // left
          [p.x - gap - lw, p.y - lh - gap / 2],  // upper-left
          [p.x - gap - lw, p.y + gap / 2],  // lower-left
          [p.x - lw / 2, p.y - gap - lh],  // above
          [p.x - lw / 2, p.y + gap],  // below
        ];

        let best = candidates[0], bestIdx = 0, testedCount = 1;
        for (let i = 0; i < candidates.length; i++) {
          const [cx, cy] = candidates[i];
          if (!overlaps(cx, cy, lw, lh)) { best = candidates[i]; bestIdx = i; break; }
          testedCount = i + 1; // this one was rejected; keep counting
        }

        if (debugLabels) {
          // Draw only tested candidates: green=chosen, red=rejected
          candidates.slice(0, testedCount).forEach(([cx, cy], i) => {
            ctx.globalAlpha = 0.85;
            ctx.fillStyle = (i === bestIdx) ? '#00ff44' : '#ff3333';
            ctx.beginPath(); ctx.arc(cx + lw / 2, cy + lh / 2, 5, 0, Math.PI * 2); ctx.fill();
          });
          // Draw label bounding box
          ctx.globalAlpha = 0.25;
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(best[0], best[1], lw, lh);
          // Draw placement order
          ctx.globalAlpha = 1;
          ctx.fillStyle = '#ffff00';
          ctx.font = `bold ${Math.round(fs * 0.7)}px system-ui,sans-serif`;
          ctx.textAlign = 'center';
          ctx.fillText(String(order), p.x, p.y - r - 6);
          ctx.font = `${fs}px system-ui,-apple-system,sans-serif`;
        }

        const [lx, ly] = best;
        placed.push({ x: lx, y: ly, w: lw, h: lh });
        ctx.fillStyle = col; ctx.globalAlpha = 0.92; ctx.textAlign = 'left';
        ctx.fillText(p.name, lx + pad, ly + pad + th / 2);
        ctx.globalAlpha = 1;
      }
      ctx.restore();
    }

    // Return a copy of proj with positions rotated by angle around canvas centre.
    function rotateProj(proj, angle, W, H) {
      if (!angle) return proj;
      const cx = W / 2, cy = H / 2;
      const cosA = Math.cos(angle), sinA = Math.sin(angle);
      return proj.map(p => ({
        ...p,
        x: cx + (p.x - cx) * cosA - (p.y - cy) * sinA,
        y: cy + (p.x - cx) * sinA + (p.y - cy) * cosA,
      }));
    }

    function renderCanvas(canvas, con, mode, showLabels = false, angle = 0) {
      const ctx = canvas.getContext('2d');
      const W = canvas.width, H = canvas.height;
      const starField = mode === 'stars' || mode === 'reveal';
      if (angle) {
        ctx.save();
        ctx.translate(W/2, H/2);
        ctx.rotate(angle);
        ctx.translate(-W/2, -H/2);
      }
      drawBackground(ctx, W, H, con, starField);
      const proj = projectStarsTAN(con.stars, con, W, H);
      if (mode === 'diagram' || mode === 'reveal') drawLines(ctx, proj, con);
      drawStars(ctx, proj);
      if (angle) ctx.restore();
      // Draw labels after restoring rotation so text stays upright
      if (mode === 'reveal' || showLabels) drawLabels(ctx, rotateProj(proj, angle, W, H), W);
    }

    // ═══════════════════════════════════════════════════════════
    // ARTWORK MODE
    // ═══════════════════════════════════════════════════════════

    // Solve best-fit similarity transform (uniform scale + rotation + translation,
    // no shear/skew) from n src points to n dst points via least squares.
    // Exactly maps 3 src points to 3 dst points: x'=a*x+c*y+e, y'=b*x+d*y+f
    function solveAffine(src, dst) {
      const [[x1, y1], [x2, y2], [x3, y3]] = src;
      const [[u1, v1], [u2, v2], [u3, v3]] = dst;
      const det = x1 * (y2 - y3) - y1 * (x2 - x3) + (x2 * y3 - x3 * y2);
      const a = (u1 * (y2 - y3) - y1 * (u2 - u3) + (u2 * y3 - u3 * y2)) / det;
      const c = (x1 * (u2 - u3) - u1 * (x2 - x3) + (x2 * u3 - x3 * u2)) / det;
      const e = (x1 * (y2 * u3 - y3 * u2) - y1 * (x2 * u3 - x3 * u2) + u1 * (x2 * y3 - x3 * y2)) / det;
      const b = (v1 * (y2 - y3) - y1 * (v2 - v3) + (v2 * y3 - v3 * y2)) / det;
      const d = (x1 * (v2 - v3) - v1 * (x2 - x3) + (x2 * v3 - x3 * v2)) / det;
      const f = (x1 * (y2 * v3 - y3 * v2) - y1 * (x2 * v3 - x3 * v2) + v1 * (x2 * y3 - x3 * y2)) / det;
      return [a, b, c, d, e, f];
    }


    const artCache = {};  // abbr -> HTMLImageElement | 'loading' | 'error'

    // showArtworkMode: overlay artwork on top of whatever is already on the canvas.
    // showLabels=true draws star name labels after the artwork is composited.
    function showArtworkMode(canvas, con, showLabels = false) {
      const src = artSrc(con.abbr);
      const art = ART[src];
      if (!art) return;

      if (artCache[src] instanceof HTMLImageElement) {
        drawArtwork(canvas, con, artCache[src], showLabels);
        return;
      }
      if (artCache[src] === 'loading' || artCache[src] === 'error') return;

      artCache[src] = 'loading';
      const img = new Image();
      img.onload = () => {
        artCache[src] = img;
        if (session.pool[session.idx] === con && session.answered)
          drawArtwork(canvas, con, img, showLabels);
      };
      img.onerror = () => { artCache[src] = 'error'; };
      img.src = art.url;
    }

    // drawArtwork: composites the artwork image over the existing canvas content.
    // angle (radians): if set, rotate anchor points around canvas centre so the
    // artwork follows the same rotation as the rest of the scene.
    function drawArtwork(canvas, con, img, showLabels = false, angle = 0) {
      const ctx = canvas.getContext('2d');
      const W = canvas.width, H = canvas.height;
      const art = ART[artSrc(con.abbr)];

      const canvasPts = projectStarsTAN(art.anchors.map(a => [a.ra, a.dec, 0]), con, W, H).map(p => ({ x: p.x, y: p.y }));
      const iw = img.naturalWidth, ih = img.naturalHeight;
      const imgPts = art.anchors.map(a => [a.px * iw, a.py * ih]);
      let dstPts = canvasPts.map(p => [p.x, p.y]);

      if (angle) {
        const cx = W / 2, cy = H / 2;
        const cosA = Math.cos(angle), sinA = Math.sin(angle);
        dstPts = dstPts.map(([x, y]) => [
          cx + (x - cx) * cosA - (y - cy) * sinA,
          cy + (x - cx) * sinA + (y - cy) * cosA,
        ]);
      }

      const xform = solveAffine(imgPts, dstPts);

      ctx.save();
      ctx.setTransform(...xform);
      ctx.globalAlpha = 0.60;
      ctx.globalCompositeOperation = 'screen';
      ctx.drawImage(img, 0, 0, iw, ih);
      ctx.restore();

      if (showLabels) {
        const starProj = projectStarsTAN(con.stars, con, W, H);
        drawLabels(ctx, starProj, W);
      }

      const creditEl = document.getElementById('art-credit');
      if (creditEl) creditEl.innerHTML = 'Art: Johan Meuris<br>Free Art Licence';

      if (debugAnchors) {
        const r = Math.max(6, W * 0.012);
        const fs = Math.max(10, Math.round(W * 0.03));
        // Use identity transform — dstPts are already in screen pixel coords
        ctx.save();
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        dstPts.forEach(([x, y], i) => {
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.strokeStyle = '#ff0';
          ctx.lineWidth = 2;
          ctx.stroke();
          ctx.fillStyle = '#ff0';
          ctx.font = `bold ${fs}px system-ui,sans-serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(String(i + 1), x, y);
        });
        ctx.restore();
      }
    }

    function showPhotoMode(con, angle = 0) {
      const canvas = document.getElementById('quiz-canvas');
      const box = document.getElementById('photo-box');
      const img = document.getElementById('photo-img');
      const msg = document.getElementById('photo-msg');

      canvas.style.display = 'none';
      box.classList.add('show');
      msg.style.display = 'none';
      img.classList.add('show');
      img.src = photoUrl(con);
      img.style.transform = angle ? `rotate(${angle}rad)` : '';
    }

    function redrawReveal(con) {
      const origAbbr = con.abbr;
      if (session.viewMode) con = tweakedCon(con);
      const showBound = document.getElementById('chk-rev-boundary').checked;
      const showDiag = document.getElementById('chk-rev-diagram').checked;
      const showArt = document.getElementById('chk-rev-artwork').checked;
      const creditEl = document.getElementById('art-credit');
      if (creditEl) creditEl.textContent = '';
      const canvas = document.getElementById('quiz-canvas');
      const ctx = canvas.getContext('2d');
      const W = canvas.width, H = canvas.height;
      const artImg = artCache[artSrc(origAbbr)] instanceof HTMLImageElement ? artCache[artSrc(origAbbr)] : null;

      const angle = session.rotation || 0;
      if (angle) {
        ctx.save();
        ctx.translate(W/2, H/2);
        ctx.rotate(angle);
        ctx.translate(-W/2, -H/2);
      }

      let revealProj = null;
      // Background
      if (settings.mode === 'photo') {
        ctx.drawImage(document.getElementById('photo-img'), 0, 0, W, H);
      } else {
        drawBackground(ctx, W, H, con, settings.mode === 'stars');
      }

      // Artwork overlay — same for all modes
      if (showArt && artImg) drawArtwork(canvas, con, artImg, false, angle);

      // Lines and stars
      revealProj = projectStarsTAN(con.stars, con, W, H);
      if (showDiag) drawLines(ctx, revealProj, con);
      if (settings.mode !== 'photo' || showDiag) drawStars(ctx, revealProj);

      // Boundary overlay (still within rotation transform for photo mode)
      if (showBound && BOUNDS[origAbbr]) {
        ctx.save();
        ctx.strokeStyle = 'rgba(120,200,120,0.55)';
        ctx.lineWidth = 1.5;
        for (const ring of BOUNDS[origAbbr]) {
          const boundPts = projectStarsTAN(ring.map(([ra, dec]) => [ra, dec, 0]), con, W, H);
          ctx.beginPath();
          let first = true;
          for (const p of boundPts) {
            if (first) { ctx.moveTo(p.x, p.y); first = false; }
            else ctx.lineTo(p.x, p.y);
          }
          ctx.closePath();
          ctx.stroke();
        }
        ctx.restore();
      }

      if (angle) ctx.restore();

      // Labels drawn after rotation restore so text stays upright
      if (showDiag && revealProj) drawLabels(ctx, rotateProj(revealProj, angle, W, H), W);
    }

    function ensureArtLoaded(con) {
      const src = artSrc(con.abbr);
      const art = ART[src];
      if (!art || artCache[src]) return;
      artCache[src] = 'loading';
      const img = new Image();
      img.onload = () => {
        artCache[src] = img;
        if (session.pool[session.idx] === con && session.answered) redrawReveal(con);
      };
      img.onerror = () => { artCache[src] = 'error'; };
      img.src = art.url;
    }

    function startReveal(con) {
      // For photo mode, swap photo-box → canvas
      if (settings.mode === 'photo') {
        document.getElementById('photo-box').classList.remove('show');
        const img = document.getElementById('photo-img');
        img.classList.remove('show');
        img.style.transform = '';
        document.getElementById('quiz-canvas').style.display = 'block';
      }
      // Show/hide checkboxes
      const artChk = document.getElementById('chk-rev-artwork').closest('label');
      artChk.style.display = ART[artSrc(con.abbr)] ? '' : 'none';
      const boundChk = document.getElementById('chk-rev-boundary').closest('label');
      boundChk.style.display = BOUNDS[con.abbr] ? '' : 'none';
      document.getElementById('reveal-controls').classList.add('show');
      redrawReveal(con);
      ensureArtLoaded(con);
    }

    function conLabel(con) {
      const hem = con.hem === 'N' ? 'northern' : con.hem === 'S' ? 'southern' : 'equatorial';
      const meaning = con.meaning ? `, ${con.meaning}` : '';
      const url = `https://en.wikipedia.org/wiki/${encodeURIComponent(con.name)}_(constellation)`;
      const link = `<a href="${url}" target="_blank" rel="noopener">${con.name}</a>`;
      return `${link}${meaning} (${hem})`;
    }

    // ═══════════════════════════════════════════════════════════
    // QUIZ STATE
    // ═══════════════════════════════════════════════════════════
    let settings = { mode: 'diagram', diff: '1', hem: 'B' };
    let session = { pool: [], idx: 0, correct: 0, answered: false, history: [], choices: [], viewMode: false };
    let viewerTweak = { scale: 1, dx: 0, dy: 0 };

    function tweakedCon(con) {
      const { scale, dx, dy } = viewerTweak;
      const newFov = 2 * Math.atan(Math.tan(con.fov * Math.PI / 360) / scale) * 180 / Math.PI;
      return { ...con, ra: ((con.ra + dx) % 360 + 360) % 360, dec: con.dec + dy, fov: newFov };
    }

    function resetViewerTweak() {
      viewerTweak = { scale: 1, dx: 0, dy: 0 };
      document.getElementById('tweak-scale').value = 100;
      document.getElementById('tweak-dx').value = 0;
      document.getElementById('tweak-dy').value = 0;
      document.getElementById('tweak-scale-val').textContent = '1.00×';
      document.getElementById('tweak-dx-val').textContent = '0.0°';
      document.getElementById('tweak-dy-val').textContent = '0.0°';
    }
    let debugLabels = false;
    let debugAnchors = false;

    // ═══════════════════════════════════════════════════════════
    // COURSE — 21-stage mastery curriculum
    // ═══════════════════════════════════════════════════════════
    const STAGES = [
      // Phase 0 — Identify Famous (pool: 12)
      { phase:0, type:'identify', diff:1, mode:'diagram' },
      { phase:0, type:'identify', diff:1, mode:'stars' },
      { phase:0, type:'identify', diff:1, mode:'photo' },
      // Phase 1 — Identify Familiar (pool: ~42)
      { phase:1, type:'identify', diff:2, mode:'diagram' },
      { phase:1, type:'identify', diff:2, mode:'stars' },
      { phase:1, type:'identify', diff:2, mode:'photo' },
      // Phase 2 — Identify Expert (pool: 88)
      { phase:2, type:'identify', diff:3, mode:'diagram' },
      { phase:2, type:'identify', diff:3, mode:'stars' },
      { phase:2, type:'identify', diff:3, mode:'photo' },
      // Phase 3 — Find Famous (pool: 12 with bounds)
      { phase:3, type:'find', diff:1, mode:'diagram', bounds:true  },
      { phase:3, type:'find', diff:1, mode:'stars',   bounds:true  },
      { phase:3, type:'find', diff:1, mode:'photo',   bounds:true  },
      { phase:3, type:'find', diff:1, mode:'photo',   bounds:false },
      // Phase 4 — Find Familiar (pool: ~42 with bounds)
      { phase:4, type:'find', diff:2, mode:'diagram', bounds:true  },
      { phase:4, type:'find', diff:2, mode:'stars',   bounds:true  },
      { phase:4, type:'find', diff:2, mode:'photo',   bounds:true  },
      { phase:4, type:'find', diff:2, mode:'photo',   bounds:false },
      // Phase 5 — Find Expert (pool: 88 with bounds)
      { phase:5, type:'find', diff:3, mode:'diagram', bounds:true  },
      { phase:5, type:'find', diff:3, mode:'stars',   bounds:true  },
      { phase:5, type:'find', diff:3, mode:'photo',   bounds:true  },
      { phase:5, type:'find', diff:3, mode:'photo',   bounds:false },
    ];

    const PHASE_LABELS = [
      'Identify · Famous', 'Identify · Familiar', 'Identify · Expert',
      'Find · Famous',     'Find · Familiar',      'Find · Expert'
    ];

    function stagePool(stage) {
      if (stage.type === 'find') {
        return C.filter(c => BOUNDS[c.abbr] && c.diff <= stage.diff);
      }
      return C.filter(c => c.stars.length > 0 && c.diff <= stage.diff);
    }

    function loadMastered() {
      try { return JSON.parse(localStorage.getItem('course-mastered')) || []; } catch { return []; }
    }
    function saveMastered(a) { localStorage.setItem('course-mastered', JSON.stringify(a)); }

    function viewConstellation(con) {
      settings.mode = 'diagram';
      document.getElementById('chk-rev-photo').checked = false;
      resetViewerTweak();
      session.pool = [con];
      session.idx = 0;
      session.answered = true;
      session.rotation = 0;
      session.courseStageIdx = null;
      session.viewMode = true;
      const quizScreen = document.getElementById('screen-quiz');
      quizScreen.classList.add('viewer-mode');
      document.getElementById('canvas-wrap').classList.add('quiz-circle');
      document.getElementById('con-select-viewer').value = con.abbr;
      document.getElementById('feedback').innerHTML = conLabel(con);
      showScreen('quiz');
      const canvas = document.getElementById('quiz-canvas');
      const sz = document.getElementById('canvas-wrap').offsetWidth;
      canvas.width = canvas.height = sz * (window.devicePixelRatio || 1);
      canvas.style.display = 'block';
      document.getElementById('photo-box').classList.remove('show');
      document.getElementById('photo-img').classList.remove('show');
      startReveal(con);
    }

    function isPhaseUnlocked(ph) {
      if (ph === 0) return true;
      const m = loadMastered();
      return STAGES.every((s, i) => s.phase !== ph - 1 || m[i]);
    }

    function stageModeLabel(stage) {
      if (stage.type === 'find') {
        if (stage.mode === 'photo') return stage.bounds ? 'Photo + Bounds' : 'Photo';
        return stage.mode === 'diagram' ? 'Diagram' : 'Stars Only';
      }
      return { diagram: 'Diagram', stars: 'Stars Only', photo: 'Photo' }[stage.mode] || stage.mode;
    }

    function renderCourseMap() {
      const map = document.getElementById('course-map');
      map.innerHTML = '';
      const mastered = loadMastered();
      // Group stages by phase
      const phases = [];
      STAGES.forEach((s, i) => {
        if (!phases[s.phase]) phases[s.phase] = [];
        phases[s.phase].push({ s, i });
      });
      phases.forEach((stagesInPhase, ph) => {
        const unlocked = isPhaseUnlocked(ph);
        const allMastered = stagesInPhase.every(({ i }) => mastered[i]);
        const div = document.createElement('div');
        div.className = 'course-phase' + (unlocked ? '' : ' locked');

        const hdr = document.createElement('div');
        hdr.className = 'phase-hdr';
        hdr.innerHTML = `<span>${PHASE_LABELS[ph]}</span><span>${allMastered ? '✓' : unlocked ? '' : '🔒'}</span>`;
        div.appendChild(hdr);

        const row = document.createElement('div');
        row.className = 'phase-stages';
        stagesInPhase.forEach(({ s, i }) => {
          const btn = document.createElement('button');
          btn.className = 'stage-btn' + (mastered[i] ? ' mastered' : '') + (!unlocked ? ' locked' : '');
          btn.textContent = stageModeLabel(s);
          if (mastered[i]) btn.innerHTML += '<span class="stage-check">✓</span>';
          if (unlocked) {
            btn.addEventListener('click', () => startCourseStage(i));
          }
          row.appendChild(btn);
        });
        div.appendChild(row);
        map.appendChild(div);
      });
    }

    function startCourseStage(idx) {
      const stage = STAGES[idx];
      if (stage.type === 'find') { startFindCourseStage(idx); return; }
      settings.mode = stage.mode;
      session.pool = stagePool(stage).sort(() => Math.random() - 0.5);
      session.idx = 0;
      session.correct = 0;
      session.answered = false;
      session.history = [];
      session.choices = [];
      session.courseStageIdx = idx;
      showScreen('quiz');
      showQuestion();
    }

    function endCourseStage() {
      const n = session.pool.length, c = session.correct;
      const mastered = (c === n);
      if (mastered) { const a = loadMastered(); a[session.courseStageIdx] = true; saveMastered(a); }
      document.getElementById('res-score').textContent = `${c} / ${n}`;
      document.getElementById('res-grade').textContent = mastered ? '⭐ Mastered!' : 'Not quite — try again';
      document.getElementById('res-stars').textContent = '';
      session.lastMastered = mastered;
      showScreen('result');
      renderResultButtons();
    }

    function renderResultButtons() {
      const div = document.getElementById('result-btns');
      div.innerHTML = '';
      const back = document.createElement('button');
      back.className = 'btn-again';
      back.textContent = 'Back to Course';
      back.addEventListener('click', () => { showScreen('start'); renderCourseMap(); });
      div.appendChild(back);
      if (!session.lastMastered && session.courseStageIdx != null) {
        const retry = document.createElement('button');
        retry.className = 'btn-settings';
        retry.textContent = 'Try Again';
        retry.addEventListener('click', () => startCourseStage(session.courseStageIdx));
        div.appendChild(retry);
      }
    }

    function startFindCourseStage(idx) {
      const stage = STAGES[idx];
      explore.quiz = {
        pool: stagePool(stage).sort(() => Math.random() - 0.5),
        idx: 0, score: 0, total: 0, target: null, answered: false,
        courseStageIdx: idx,
        stageMode: stage.mode,
        bounds: stage.bounds,
      };
      explore.ra = 180; explore.dec = 30; explore.fov = 90;
      document.getElementById('explore-quiz-bar').style.display = 'flex';
      document.querySelector('.explore-layers').style.display = 'none';
      showScreen('explore');
      nextExploreQuestion();
      drawExplore();
    }

    function endFindCourseStage() {
      const q = explore.quiz;
      const n = q.total, c = q.score;
      const mastered = (c === n && n > 0);
      if (mastered) { const a = loadMastered(); a[q.courseStageIdx] = true; saveMastered(a); }
      document.getElementById('res-score').textContent = `${c} / ${n}`;
      document.getElementById('res-grade').textContent = mastered ? '⭐ Mastered!' : 'Not quite — try again';
      document.getElementById('res-stars').textContent = '';
      session.lastMastered = mastered;
      session.courseStageIdx = q.courseStageIdx;
      stopExploreQuiz();
      showScreen('result');
      renderResultButtons();
    }

    function buildPool() {
      const maxD = parseInt(settings.diff), hem = settings.hem;
      return C.filter(c => {
        if (c.stars.length === 0) return false;
        if (c.diff > maxD) return false;
        if (hem === 'N' && c.hem === 'S') return false;
        if (hem === 'S' && c.hem === 'N') return false;
        return true;
      }).sort(() => Math.random() - .5);
    }

    function getDistractors(correct, pool) {
      const others = pool.filter(c => c !== correct).sort(() => Math.random() - .5);
      const same = others.filter(c => c.diff === correct.diff);
      const rest = others.filter(c => c.diff !== correct.diff);
      return [...same, ...rest].slice(0, 3);
    }

    function startQuiz() {
      session.pool = buildPool();
      session.idx = 0;
      session.correct = 0;
      session.answered = false;
      session.history = [];
      session.choices = [];
      if (session.pool.length === 0) {
        alert('No constellations match those settings. Try broader options.');
        return;
      }
      showScreen('quiz');
      showQuestion();
    }

    function updatePrevBtn() {
      const canGoPrev = session.idx > 0 && session.history[session.idx - 1];
      document.getElementById('btn-prev').classList.toggle('show', !!canGoPrev);
    }

    function showQuestion() {
      const con = session.pool[session.idx];
      const hist = session.history[session.idx];

      const total = session.pool.length;
      document.getElementById('hud-progress').textContent = `${session.idx + 1} / ${total}`;
      document.getElementById('hud-score').textContent = `${session.correct} correct`;
      document.getElementById('prog-fill').style.width = `${(session.idx / total) * 100}%`;

      document.getElementById('feedback').textContent = '';
      document.getElementById('reveal-controls').classList.remove('show');
      document.getElementById('btn-next').classList.remove('show');

      const canvas = document.getElementById('quiz-canvas');
      const box = document.getElementById('photo-box');
      box.classList.remove('show');
      document.getElementById('photo-img').classList.remove('show');
      canvas.style.display = 'block';
      document.getElementById('canvas-wrap').classList.add('quiz-circle');

      if (hist) {
        session.answered = true;
        session.rotation = hist.rotation;
      } else {
        session.answered = false;
        session.rotation = Math.random() * Math.PI * 2;
      }

      const sz = document.getElementById('canvas-wrap').offsetWidth;
      canvas.width = canvas.height = sz * (window.devicePixelRatio || 1);

      if (settings.mode === 'photo') {
        showPhotoMode(con, session.rotation);
      } else {
        renderCanvas(canvas, con, settings.mode, false, session.rotation);
      }

      const grid = document.getElementById('ans-grid');
      grid.innerHTML = '';
      if (hist) {
        // Replay previously answered state
        hist.choices.forEach(c => {
          const btn = document.createElement('button');
          btn.className = 'ans-btn';
          btn.textContent = c.name;
          btn.disabled = true;
          if (c === con) btn.classList.add('ok');
          else if (c === hist.chosen && hist.chosen !== con) btn.classList.add('err');
          grid.appendChild(btn);
        });
        document.getElementById('feedback').innerHTML = hist.wasCorrect
          ? `✓ Correct! — ${conLabel(con)}`
          : `✗ That was ${conLabel(con)}`;
        startReveal(con);
        document.getElementById('btn-next').classList.add('show');
      } else {
        const wrongs = getDistractors(con, session.pool);
        session.choices = [con, ...wrongs].sort(() => Math.random() - .5);
        session.choices.forEach(c => {
          const btn = document.createElement('button');
          btn.className = 'ans-btn';
          btn.textContent = c.name;
          btn.addEventListener('click', () => handleAnswer(c, con));
          grid.appendChild(btn);
        });
      }

      updatePrevBtn();
    }

    function handleAnswer(chosen, correct) {
      if (session.answered) return;
      session.answered = true;

      session.history[session.idx] = {
        chosen, wasCorrect: chosen === correct,
        rotation: session.rotation, choices: session.choices,
      };

      document.querySelectorAll('.ans-btn').forEach(b => {
        b.disabled = true;
        if (b.textContent === correct.name) b.classList.add('ok');
        else if (b.textContent === chosen.name && chosen !== correct) b.classList.add('err');
      });

      if (chosen === correct) {
        session.correct++;
        document.getElementById('hud-score').textContent = `${session.correct} correct`;
        document.getElementById('feedback').innerHTML = `✓ Correct! — ${conLabel(correct)}`;
      } else {
        document.getElementById('feedback').innerHTML = `✗ That was ${conLabel(correct)}`;
      }

      startReveal(correct);

      document.getElementById('btn-next').classList.add('show');
      updatePrevBtn();
    }

    function nextQuestion() {
      session.idx++;
      if (session.idx >= session.pool.length) {
        if (session.courseStageIdx != null) endCourseStage();
        else showResults();
      } else {
        showQuestion();
      }
    }

    function showResults(total = session.pool.length) {
      const pct = total > 0 ? session.correct / total : 0;
      document.getElementById('res-score').textContent = `${session.correct} / ${total}`;
      let grade, stars;
      if (pct >= .9) { grade = 'Astronomer'; stars = '★★★'; }
      else if (pct >= .7) { grade = 'Sky Watcher'; stars = '★★☆'; }
      else if (pct >= .5) { grade = 'Stargazer'; stars = '★☆☆'; }
      else { grade = 'Keep Practicing'; stars = '☆☆☆'; }
      document.getElementById('res-grade').textContent = grade;
      document.getElementById('res-stars').textContent = stars;
      session.lastMastered = false;
      showScreen('result');
      renderResultButtons();
    }

    // ═══════════════════════════════════════════════════════════
    // UI
    // ═══════════════════════════════════════════════════════════
    function showScreen(n) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById('screen-' + n).classList.add('active');
    }

    function initPills(id, key) {
      document.getElementById(id).querySelectorAll('.pill').forEach(btn => {
        btn.addEventListener('click', () => {
          document.getElementById(id).querySelectorAll('.pill').forEach(b => b.classList.remove('on'));
          btn.classList.add('on');
          settings[key] = btn.dataset.val;
          updateCount();
        });
      });
    }

    function updateCount() {
      const hem = settings.hem;
      function hemOk(c) { return c.stars.length > 0 && !(hem === 'N' && c.hem === 'S') && !(hem === 'S' && c.hem === 'N'); }
      const n1 = C.filter(c => c.diff <= 1 && hemOk(c)).length;
      const n2 = C.filter(c => c.diff <= 2 && hemOk(c)).length;
      const n3 = C.filter(c => c.diff <= 3 && hemOk(c)).length;
      const pills = document.getElementById('diff-group').querySelectorAll('.pill');
      pills[0].innerHTML = `Famous<small>${n1} constellations</small>`;
      pills[1].innerHTML = `Familiar<small>adds ${n2 - n1} more</small>`;
      pills[2].innerHTML = `Expert<small>all ${n3}</small>`;
      document.getElementById('btn-start').textContent = `Start Quiz (${buildPool().length} constellations) ›`;
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadBounds();
      renderCourseMap();

      // Populate constellation viewer select
      const sorted = [...C].sort((a, b) => a.name.localeCompare(b.name));
      [document.getElementById('con-select'), document.getElementById('con-select-viewer')].forEach(sel => {
        sorted.forEach(con => {
          const opt = document.createElement('option');
          opt.value = con.abbr;
          opt.textContent = con.name;
          sel.appendChild(opt);
        });
      });
      document.getElementById('btn-view').addEventListener('click', () => {
        const con = C.find(c => c.abbr === document.getElementById('con-select').value);
        if (con) viewConstellation(con);
      });
      document.getElementById('btn-explore-free').addEventListener('click', () => {
        stopExploreQuiz();
        explore.ra = 0; explore.dec = 30; explore.fov = 90;
        showScreen('explore');
        drawExplore();
      });
      document.getElementById('con-select-viewer').addEventListener('change', () => {
        const con = C.find(c => c.abbr === document.getElementById('con-select-viewer').value);
        if (con) viewConstellation(con);
      });

      // Viewer tweak sliders
      function onTweakChange() {
        viewerTweak.scale = document.getElementById('tweak-scale').value / 100;
        viewerTweak.dx    = parseFloat(document.getElementById('tweak-dx').value);
        viewerTweak.dy    = parseFloat(document.getElementById('tweak-dy').value);
        document.getElementById('tweak-scale-val').textContent = viewerTweak.scale.toFixed(2) + '×';
        document.getElementById('tweak-dx-val').textContent    = viewerTweak.dx.toFixed(1) + '°';
        document.getElementById('tweak-dy-val').textContent    = viewerTweak.dy.toFixed(1) + '°';
        const con = session.pool[session.idx];
        if (con && session.viewMode) redrawReveal(con);
      }
      ['tweak-scale','tweak-dx','tweak-dy'].forEach(id =>
        document.getElementById(id).addEventListener('input', onTweakChange));

      document.getElementById('btn-copy-framing').addEventListener('click', () => {
        const con = session.pool[session.idx];
        if (!con) return;
        const tc = tweakedCon(con);
        const text = `ra: ${tc.ra.toFixed(1)}, dec: ${tc.dec.toFixed(1)}, fov: ${tc.fov.toFixed(1)}`;
        navigator.clipboard.writeText(text).then(() => {
          const btn = document.getElementById('btn-copy-framing');
          btn.textContent = 'Copied!';
          setTimeout(() => { btn.textContent = 'Copy ra/dec/fov'; }, 1500);
        });
      });

      document.getElementById('btn-next').addEventListener('click', nextQuestion);
      document.getElementById('btn-prev').addEventListener('click', () => {
        if (session.idx > 0 && session.history[session.idx - 1]) {
          session.idx--;
          showQuestion();
        }
      });
      document.getElementById('btn-quit').addEventListener('click', () => {
        if (session.viewMode) {
          session.viewMode = false;
          document.getElementById('screen-quiz').classList.remove('viewer-mode');
          showScreen('start');
          renderCourseMap();
          return;
        }
        const answered = session.idx + (session.answered ? 1 : 0);
        showResults(answered);
      });

      document.getElementById('chk-rev-photo').addEventListener('change', () => {
        const con = session.pool[session.idx];
        if (!con || !session.answered) return;
        const checked = document.getElementById('chk-rev-photo').checked;
        settings.mode = checked ? 'photo' : 'diagram';
        if (checked) {
          const img = document.getElementById('photo-img');
          img.src = photoUrl(con);
          if (img.complete) { redrawReveal(con); }
          else { img.onload = () => redrawReveal(con); }
        } else {
          redrawReveal(con);
        }
      });

      document.getElementById('chk-rev-boundary').addEventListener('change', () => {
        const con = session.pool[session.idx];
        if (con && session.answered) redrawReveal(con);
      });
      document.getElementById('chk-rev-diagram').addEventListener('change', () => {
        const con = session.pool[session.idx];
        if (con && session.answered) redrawReveal(con);
      });
      document.getElementById('chk-rev-artwork').addEventListener('change', () => {
        const con = session.pool[session.idx];
        if (con && session.answered) redrawReveal(con);
      });

      // Explore mode
      document.getElementById('btn-explore-back').addEventListener('click', () => {
        stopExploreQuiz();
        showScreen('start');
        renderCourseMap();
      });
      document.getElementById('eq-next').addEventListener('click', nextExploreQuestion);

      // Populate explore search datalist
      const exploreList = document.getElementById('explore-con-list');
      [...C].sort((a, b) => a.name.localeCompare(b.name)).forEach(con => {
        const opt = document.createElement('option');
        opt.value = con.name;
        exploreList.appendChild(opt);
      });

      function goToConstellation() {
        const val = document.getElementById('explore-search-input').value.trim();
        const con = C.find(c => c.name.toLowerCase() === val.toLowerCase());
        if (!con) return;
        explore.ra = con.ra;
        explore.dec = con.dec;
        drawExplore();
        document.getElementById('explore-search-input').blur();
      }
      document.getElementById('explore-search-go').addEventListener('click', goToConstellation);
      document.getElementById('explore-search-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') goToConstellation();
      });
      const exploreCheckboxIds = ['chk-ex-photo', 'chk-ex-diagram', 'chk-ex-starlabels', 'chk-ex-connames', 'chk-ex-equator', 'chk-ex-bounds', 'chk-ex-art'];
      // Restore saved checkbox states
      exploreCheckboxIds.forEach(id => {
        const saved = localStorage.getItem(id);
        if (saved !== null) document.getElementById(id).checked = saved === '1';
      });
      // Save on change and redraw
      exploreCheckboxIds.forEach(id => {
        document.getElementById(id).addEventListener('change', () => {
          localStorage.setItem(id, document.getElementById(id).checked ? '1' : '0');
          drawExplore();
        });
      });

      // Explore drag (mouse)
      const ew = document.getElementById('explore-wrap');
      const ec = document.getElementById('explore-canvas');

      function expClientToCanvas(cx, cy) {
        const dpr = window.devicePixelRatio || 1;
        const rect = ec.getBoundingClientRect();
        return { px: (cx - rect.left) * dpr, py: (cy - rect.top) * dpr };
      }
      function expDragStart(cx, cy) {
        const { px, py } = expClientToCanvas(cx, cy);
        const anchor = pixelToRADec(px, py, explore.ra, explore.dec, explore.fov, ec.width, ec.height);
        explore.drag = { anchor, startRa: explore.ra, startDec: explore.dec, startPx: px, startPy: py };
        exploreDragMoved = false;
        ew.classList.add('dragging');
      }
      function expDragMove(cx, cy) {
        if (!explore.drag) return;
        const { px, py } = expClientToCanvas(cx, cy);
        const dx = px - explore.drag.startPx, dy = py - explore.drag.startPy;
        if (!exploreDragMoved && Math.sqrt(dx * dx + dy * dy) < 5) return;
        exploreDragMoved = true;
        const W = ec.width, H = ec.height;
        const { anchor, startRa, startDec } = explore.drag;
        const v_anchor = raDecToVec(anchor.ra, anchor.dec);
        const v_start = raDecToVec(startRa, startDec);
        const cur = pixelToRADec(px, py, startRa, startDec, explore.fov, W, H);
        const v_cur = raDecToVec(cur.ra, cur.dec);
        const v_new = rotateByFromTo(v_start, v_cur, v_anchor);
        const newPos = vecToRaDec(v_new);
        explore.ra = newPos.ra;
        explore.dec = newPos.dec;
        drawExplore();
      }
      function expDragEnd() { explore.drag = null; ew.classList.remove('dragging'); }

      ec.addEventListener('mousedown', e => expDragStart(e.clientX, e.clientY));
      window.addEventListener('mousemove', e => expDragMove(e.clientX, e.clientY));
      window.addEventListener('mouseup', expDragEnd);
      ec.addEventListener('click', e => {
        if (!explore.quiz || explore.quiz.answered || exploreDragMoved) return;
        const { px, py } = expClientToCanvas(e.clientX, e.clientY);
        handleExploreClick(px, py);
      });
      ec.addEventListener('touchstart', e => { e.preventDefault(); expDragStart(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
      ec.addEventListener('touchmove', e => { e.preventDefault(); expDragMove(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
      ec.addEventListener('touchend', e => {
        expDragEnd();
        if (explore.quiz && !explore.quiz.answered && !exploreDragMoved && e.changedTouches.length) {
          const t = e.changedTouches[0];
          const { px, py } = expClientToCanvas(t.clientX, t.clientY);
          handleExploreClick(px, py);
        }
      });

      // Scroll to zoom
      ec.addEventListener('wheel', e => {
        e.preventDefault();
        explore.fov = Math.max(10, Math.min(110, explore.fov * (e.deltaY > 0 ? 1.1 : 0.9)));
        drawExplore();
      }, { passive: false });

      document.addEventListener('keydown', e => {
        if (!document.getElementById('screen-quiz').classList.contains('active')) return;
        const btns = [...document.querySelectorAll('.ans-btn')];
        const idx = { '1': 0, '2': 1, '3': 2, '4': 3 }[e.key];
        if (idx !== undefined && btns[idx] && !btns[idx].disabled) btns[idx].click();
        if ((e.key === 'Enter' || e.key === ' ') && document.getElementById('btn-next').classList.contains('show'))
          document.getElementById('btn-next').click();
        if (e.key === 'd' || e.key === 'D') {
          debugLabels = !debugLabels;
          const con = session.pool[session.idx];
          if (con && session.answered) redrawReveal(con);
        }
        if (e.key === 'a' || e.key === 'A') {
          debugAnchors = !debugAnchors;
          const con = session.pool[session.idx];
          if (con && session.answered) redrawReveal(con);
        }
      });
    });
  </script>
</body>

</html>
