<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Constellation Quiz</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    :root {
      --bg: #05060f;
      --card: #0c0f1e;
      --border: rgba(255, 255, 255, 0.08);
      --accent: #5b8af5;
      --accent2: #a456f7;
      --text: #d8e2ff;
      --dim: #5a6480;
      --ok: #22c55e;
      --err: #ef4444;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif
    }

    #app {
      max-width: 680px;
      margin: 0 auto;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      padding: 12px
    }

    .screen {
      display: none;
      flex-direction: column;
      gap: 12px;
      flex: 1
    }

    .screen.active {
      display: flex
    }

    .logo {
      text-align: center;
      padding: 12px 0 4px
    }

    .logo h1 {
      font-size: 1.7rem;
      font-weight: 300;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: #a8bfff
    }

    .logo p {
      margin-top: 6px;
      color: var(--dim);
      font-size: .8rem;
      letter-spacing: .12em
    }

    .sec-label {
      font-size: .7rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 8px
    }

    .pill-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap
    }

    .pill {
      flex: 1;
      min-width: 90px;
      padding: 10px 8px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--dim);
      border-radius: 10px;
      cursor: pointer;
      font-size: .88rem;
      text-align: center;
      transition: all .18s;
      line-height: 1.3
    }

    .pill:hover {
      border-color: var(--accent);
      color: var(--text)
    }

    .pill.on {
      border-color: var(--accent);
      background: rgba(91, 138, 245, .14);
      color: #b0ccff
    }

    .pill small {
      display: block;
      font-size: .68rem;
      margin-top: 3px;
      opacity: .7
    }

    .btn-go {
      align-self: center;
      padding: 14px 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      cursor: pointer;
      letter-spacing: .06em;
      transition: opacity .2s
    }

    .btn-go:hover {
      opacity: .85
    }

    /* quiz */
    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: .82rem;
      color: var(--dim)
    }

    .hud-score {
      color: #a8bfff;
      font-weight: 500
    }

    #btn-quit {
      padding: 3px 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--dim);
      border-radius: 6px;
      cursor: pointer;
      font-size: .75rem;
      transition: all .18s
    }

    #btn-quit:hover {
      border-color: var(--err);
      color: #fca5a5
    }

    .prog-wrap {
      height: 3px;
      background: rgba(255, 255, 255, .08);
      border-radius: 2px;
      margin-top: 6px
    }

    .prog-fill {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width .35s
    }

    #canvas-area {
      position: relative;
      aspect-ratio: 1;
      flex-shrink: 0;
      width: 80%;
      align-self: center;
    }
    #canvas-wrap {
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #010208;
      position: relative;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%
    }

    #photo-box {
      display: none;
      position: absolute;
      inset: 0;
      background: #010208;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px
    }

    #photo-box.show {
      display: flex
    }

    #photo-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      border-radius: inherit
    }

    #photo-img.show {
      display: block
    }

    #photo-msg {
      color: var(--dim);
      font-size: .82rem;
      text-align: center;
      padding: 0 20px
    }

    .q-label {
      text-align: center;
      color: var(--dim);
      font-size: .8rem;
      letter-spacing: .1em
    }

    .ans-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px
    }

    .ans-btn {
      padding: 9px 10px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      border-radius: 10px;
      cursor: pointer;
      font-size: .88rem;
      text-align: center;
      transition: all .18s
    }

    .ans-btn:hover:not(:disabled) {
      border-color: var(--accent);
      background: rgba(91, 138, 245, .1)
    }

    .ans-btn:disabled {
      cursor: default
    }

    .ans-btn.ok {
      border-color: var(--ok) !important;
      background: rgba(34, 197, 94, .14) !important;
      color: #86efac !important
    }

    .ans-btn.err {
      border-color: var(--err) !important;
      background: rgba(239, 68, 68, .14) !important;
      color: #fca5a5 !important
    }

    #feedback {
      text-align: center;
      min-height: 22px;
      font-size: .88rem;
      color: var(--dim)
    }

    #feedback a {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 2px
    }

    #feedback a:hover {
      color: var(--text)
    }

    .btn-next {
      align-self: center;
      padding: 8px 28px;
      border: 1px solid var(--accent);
      background: rgba(91, 138, 245, .12);
      color: #b0ccff;
      border-radius: 10px;
      cursor: pointer;
      font-size: .9rem;
      transition: all .18s;
      display: none
    }

    .btn-next.show {
      display: block
    }

    .btn-next:hover {
      background: rgba(91, 138, 245, .22)
    }

    .nav-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      align-items: center
    }

    .btn-prev {
      padding: 8px 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--dim);
      border-radius: 10px;
      cursor: pointer;
      font-size: .9rem;
      transition: all .18s;
      display: none
    }

    .btn-prev.show {
      display: block
    }

    .btn-prev:hover {
      border-color: var(--dim);
      color: var(--text)
    }

    #reveal-controls {
      display: none;
      flex-direction: row;
      gap: 18px;
      align-items: center;
      justify-content: center
    }

    #reveal-controls.show {
      display: flex
    }

    .rev-chk {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: .82rem;
      color: var(--dim);
      cursor: pointer;
      user-select: none
    }

    .rev-chk input {
      accent-color: var(--accent);
      cursor: pointer;
      width: 13px;
      height: 13px
    }

    /* results */
    .result-wrap {
      text-align: center;
      padding: 20px 0
    }

    .result-num {
      font-size: 3.5rem;
      font-weight: 200;
      color: #a8bfff;
      letter-spacing: .04em
    }

    .result-sub {
      color: var(--dim);
      margin-top: 4px
    }

    .result-grade {
      font-size: 1.3rem;
      margin-top: 16px;
      letter-spacing: .06em
    }

    .result-stars {
      font-size: 2rem;
      margin-top: 8px;
      letter-spacing: .15em
    }

    .btn-again {
      align-self: center;
      padding: 13px 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: .95rem;
      cursor: pointer;
      transition: opacity .2s
    }

    .btn-again:hover {
      opacity: .85
    }

    .btn-settings {
      align-self: center;
      padding: 12px 28px;
      border: 1px solid var(--accent);
      background: rgba(91, 138, 245, .1);
      color: #b0ccff;
      border-radius: 12px;
      font-size: .95rem;
      cursor: pointer;
      transition: all .18s
    }

    .btn-settings:hover {
      background: rgba(91, 138, 245, .2)
    }

    .btn-explore {
      align-self: center;
      padding: 10px 32px;
      border: 1px solid var(--accent);
      background: rgba(91, 138, 245, .1);
      color: #b0ccff;
      border-radius: 12px;
      font-size: .95rem;
      cursor: pointer;
      transition: all .18s
    }

    .btn-explore:hover {
      background: rgba(91, 138, 245, .2)
    }

    .explore-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .explore-layers {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap
    }

    .btn-back-explore {
      padding: 4px 12px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--dim);
      border-radius: 6px;
      cursor: pointer;
      font-size: .78rem;
      transition: all .18s
    }

    .btn-back-explore:hover {
      border-color: var(--accent);
      color: var(--text)
    }

    #explore-area {
      position: relative;
      aspect-ratio: 1;
      width: 100%;
      flex-shrink: 0;
    }
    #explore-wrap {
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #010208;
      cursor: grab;
      width: 100%;
      height: 100%;
    }
    #explore-art-credit { position:absolute; bottom:6px; right:8px; font-size:.65rem;
                          color:rgba(255,255,255,0.35); pointer-events:none; }

    #explore-wrap.dragging {
      cursor: grabbing
    }

    #explore-quiz-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 4px;
      flex-wrap: wrap;
      min-height: 36px
    }
    .eq-prompt { flex: 1; font-size: .95rem; color: var(--text) }
    .eq-prompt strong { color: #a8d4ff }
    .eq-score { color: var(--dim); font-size: .85rem; white-space: nowrap }
    .eq-feedback { font-size: .9rem }
    .eq-feedback.correct { color: #6f8 }
    .eq-feedback.wrong { color: #f88 }
    .btn-eq-next {
      padding: 4px 14px;
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent);
      border-radius: 6px;
      cursor: pointer;
      font-size: .8rem
    }
    .btn-eq-next:hover { background: var(--accent); color: #000 }
    #explore-search { display:flex; gap:4px; align-items:center; }
    #explore-search-input { background:var(--bg); color:var(--text); border:1px solid var(--border);
                            border-radius:8px; padding:5px 8px; font-size:.8rem; width:150px; }
    #explore-search-go { padding:5px 10px; border:1px solid var(--border); background:transparent;
                         color:var(--text); border-radius:8px; cursor:pointer; font-size:.8rem; }
    #explore-search-go:hover { border-color:var(--accent); color:var(--accent); }
    .btn-explore-quiz {
      padding: 4px 12px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--dim);
      border-radius: 6px;
      cursor: pointer;
      font-size: .78rem;
      transition: all .18s
    }
    .btn-explore-quiz:hover { border-color: var(--accent); color: var(--text) }
    .btn-explore-quiz.active { border-color: var(--accent); color: var(--accent) }

    /* Course map */
    .course-header { text-align:center; padding:20px 0 8px; }
    .course-header h1 { font-size:1.4rem; }
    .course-phase { margin-bottom:24px; }
    .course-phase.locked { opacity:0.4; }
    .phase-hdr { display:flex; justify-content:space-between; align-items:center;
                 font-size:.72rem; text-transform:uppercase; letter-spacing:.13em;
                 color:var(--dim); margin-bottom:8px; }
    .phase-stages { display:flex; gap:8px; flex-wrap:wrap; }
    .stage-btn { padding:7px 14px; border:1px solid var(--border); border-radius:8px;
                 background:transparent; color:var(--text); cursor:pointer; font-size:.82rem;
                 transition:border-color .15s; }
    .stage-btn:not(.locked):hover { border-color:var(--accent); color:var(--accent); }
    .stage-btn.mastered { border-color:#6f8; color:#6f8; }
    .stage-btn.locked { opacity:0.5; cursor:default; pointer-events:none; }
    .stage-check { margin-left:5px; }
    #canvas-wrap.quiz-circle { border-radius: 50%; }
    #art-credit { position:absolute; bottom:6px; right:8px; font-size:.65rem;
                  color:rgba(255,255,255,0.35); pointer-events:none;
                  text-align:right; line-height:1.4; }
    .viewer-row { display:flex; gap:8px; justify-content:center; margin-top:10px; }
    #con-select { background:var(--bg); color:var(--text); border:1px solid var(--border);
                  border-radius:8px; padding:6px 10px; font-size:.85rem; }
    #btn-view { padding:6px 14px; border:1px solid var(--accent); color:var(--accent);
                background:transparent; border-radius:8px; cursor:pointer; font-size:.85rem; }
    #btn-view:hover { background:var(--accent); color:#000; }
    #btn-explore-free { padding:6px 14px; border:1px solid var(--border); color:var(--dim);
                        background:transparent; border-radius:8px; cursor:pointer; font-size:.85rem; }
    #btn-explore-free:hover { border-color:var(--dim); color:var(--text); }
    .viewer-mode .hud, .viewer-mode .prog-wrap, .viewer-mode .q-label,
    .viewer-mode .ans-grid, .viewer-mode .nav-row { display:none !important; }
    #lbl-rev-photo { display:none; }
    .viewer-mode #lbl-rev-photo { display:inline-flex; }
    #viewer-select-row { display:none; justify-content:center; margin-top:10px; }
    .viewer-mode #viewer-select-row { display:flex; }
    #viewer-tweak { display:none; padding:8px 16px; }
    .viewer-mode #viewer-tweak { display:block; }
    .tweak-row { display:flex; align-items:center; gap:8px; margin:4px 0; font-size:.8rem; }
    .tweak-row label { width:80px; flex-shrink:0; }
    .tweak-val { color:var(--accent); }
    .tweak-row input[type=range] { flex:1; }
    #btn-copy-framing { padding:6px 16px; border:1px solid var(--border); background:transparent;
                        color:var(--text); border-radius:8px; cursor:pointer; font-size:.82rem; }
    #btn-copy-framing:hover { border-color:var(--accent); color:var(--accent); }
    #con-select-viewer { background:var(--bg); color:var(--text); border:1px solid var(--border);
                         border-radius:8px; padding:6px 10px; font-size:.85rem; }
  </style>
</head>

<body>
  <div id="app">

    <div id="screen-start" class="screen active">
      <div class="course-header">
        <h1>✦ Constellation Mastery</h1>
        <div class="viewer-row">
          <select id="con-select"></select>
          <button id="btn-view">View ›</button>
          <button id="btn-explore-free">Sky Explorer ›</button>
        </div>
      </div>
      <div id="course-map"></div>
    </div>

    <div id="screen-quiz" class="screen">
      <div>
        <div class="hud">
          <span id="hud-progress">1 / 10</span>
          <span class="hud-score" id="hud-score">0 correct</span>
          <button id="btn-quit">Quit</button>
        </div>
        <div class="prog-wrap">
          <div class="prog-fill" id="prog-fill" style="width:0%"></div>
        </div>
      </div>
      <div id="canvas-area">
        <div id="canvas-wrap">
          <canvas id="quiz-canvas"></canvas>
          <div id="photo-box">
            <img id="photo-img" alt="Night sky photograph">
            <div id="photo-msg">Loading DSS sky photograph…</div>
          </div>
        </div>
        <div id="art-credit"></div>
      </div>
      <p class="q-label">What constellation is this?</p>
      <div class="ans-grid" id="ans-grid"></div>
      <div id="feedback"></div>
      <div id="reveal-controls">
        <label class="rev-chk" id="lbl-rev-photo"><input type="checkbox" id="chk-rev-photo"> Photo</label>
        <label class="rev-chk"><input type="checkbox" id="chk-rev-boundary" checked> Boundary</label>
        <label class="rev-chk"><input type="checkbox" id="chk-rev-diagram" checked> Diagram</label>
        <label class="rev-chk"><input type="checkbox" id="chk-rev-artwork" checked> Artwork</label>
      </div>
      <div id="viewer-select-row"><select id="con-select-viewer"></select></div>
      <div id="viewer-tweak">
        <div class="tweak-row">
          <label>Scale <span class="tweak-val" id="tweak-scale-val">1.00×</span></label>
          <input type="range" id="tweak-scale" min="25" max="400" value="100" step="1">
        </div>
        <div class="tweak-row">
          <label>X <span class="tweak-val" id="tweak-dx-val">0.0°</span></label>
          <input type="range" id="tweak-dx" min="-45" max="45" value="0" step="0.5">
        </div>
        <div class="tweak-row">
          <label>Y <span class="tweak-val" id="tweak-dy-val">0.0°</span></label>
          <input type="range" id="tweak-dy" min="-45" max="45" value="0" step="0.5">
        </div>
        <div style="text-align:center;margin-top:6px">
          <button id="btn-copy-framing">Copy ra/dec/fov</button>
        </div>
      </div>
      <div class="nav-row">
        <button class="btn-prev" id="btn-prev">← Prev</button>
        <button class="btn-next" id="btn-next">Next →</button>
      </div>
    </div>

    <div id="screen-explore" class="screen">
      <div class="explore-hdr">
        <button class="btn-back-explore" id="btn-explore-back">← Back</button>
        <span style="color:var(--dim);font-size:.75rem;letter-spacing:.15em;text-transform:uppercase">Sky Explorer</span>
        <div id="explore-search">
          <input type="text" id="explore-search-input" list="explore-con-list" placeholder="Find constellation…" autocomplete="off">
          <datalist id="explore-con-list"></datalist>
          <button id="explore-search-go">Go</button>
        </div>
      </div>
      <div id="explore-quiz-bar" style="display:none">
        <div class="eq-prompt">Click on: <strong id="eq-target-name"></strong></div>
        <div class="eq-score" id="eq-score">0 / 0</div>
        <div class="eq-feedback" id="eq-feedback"></div>
        <button class="btn-eq-next" id="eq-next" style="display:none">Next →</button>
      </div>
      <div class="explore-layers">
        <label class="rev-chk"><input type="checkbox" id="chk-ex-photo" checked> Photo</label>
        <label class="rev-chk"><input type="checkbox" id="chk-ex-diagram" checked> Diagram</label>
        <label class="rev-chk"><input type="checkbox" id="chk-ex-starlabels" checked> Star names</label>
        <label class="rev-chk"><input type="checkbox" id="chk-ex-connames" checked> Con. names</label>
        <label class="rev-chk"><input type="checkbox" id="chk-ex-equator" checked> Equator</label>
        <label class="rev-chk"><input type="checkbox" id="chk-ex-bounds" checked> Bounds</label>
        <label class="rev-chk"><input type="checkbox" id="chk-ex-art" checked> Art</label>
      </div>
      <div id="explore-area">
        <div id="explore-wrap">
          <canvas id="explore-canvas"></canvas>
        </div>
        <div id="explore-art-credit"></div>
      </div>
    </div>

    <div id="screen-result" class="screen">
      <div class="result-wrap">
        <div class="result-num" id="res-score">0 / 0</div>
        <div class="result-sub">constellations identified correctly</div>
        <div class="result-grade" id="res-grade"></div>
        <div class="result-stars" id="res-stars"></div>
      </div>
      <div id="result-btns" style="display:flex;flex-direction:column;align-items:center;gap:12px"></div>
    </div>

  </div>
  <script>
    // ═══════════════════════════════════════════════════════════
    // BOUNDS — IAU constellation boundary polygons
    // Loaded from d3-celestial GeoJSON; keyed by IAU abbr.
    // Each entry is an ARRAY OF RINGS (arrays of [ra_deg, dec_deg] pairs).
    // Most constellations have one ring, but split constellations like Serpens
    // (Serpens Caput + Serpens Cauda) appear as two separate GeoJSON features
    // with the same id — so we accumulate into an array rather than overwriting.
    // All boundary draw and hit-test code must iterate over all rings.
    // ═══════════════════════════════════════════════════════════
    let BOUNDS = {};

    async function loadBounds() {
      try {
        const resp = await fetch('https://cdn.jsdelivr.net/gh/ofrohn/d3-celestial@master/data/constellations.bounds.json');
        const data = await resp.json();
        for (const feat of data.features) {
          const abbr = feat.id;
          const coords = feat.geometry.coordinates[0];
          // GeoJSON lon = RA stored in [-180, 180]; convert back to [0, 360]
          const ring = coords.map(([lon, lat]) => [lon >= 0 ? lon : lon + 360, lat]);
          // Use push (not assign) so split constellations accumulate both rings
          if (!BOUNDS[abbr]) BOUNDS[abbr] = [];
          BOUNDS[abbr].push(ring);
        }
      } catch (e) {
        console.warn('Could not load constellation boundaries:', e);
      }
    }

    // ═══════════════════════════════════════════════════════════
    // DATA  — stars: [ra_deg, dec_deg, mag, colorHint?, name?]
    // Source: Stellarium constellationship.fab + HYG v41 catalog
    // ═══════════════════════════════════════════════════════════
    const C = [

      // ── DIFF 1: FAMOUS ────────────────────────────────────────────────────────
