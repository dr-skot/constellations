<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Artwork Alignment Fix</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#05060f;color:#d8e2ff;font:14px system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:16px;gap:12px}
h1{font-size:1rem;color:#5b8af5;letter-spacing:.08em;text-transform:uppercase}
#top{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
select{background:#0c0f1e;color:#d8e2ff;border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:5px 10px;font-size:.9rem;cursor:pointer}
canvas{border:1px solid rgba(255,255,255,.08);border-radius:8px;display:block}
#controls{width:600px;max-width:100%;display:grid;grid-template-columns:80px 1fr 60px;gap:6px 10px;align-items:center}
.lbl{text-align:right;color:#5a6480;font-size:.82rem}
input[type=range]{width:100%;accent-color:#5b8af5}
.val{font-size:.82rem;color:#b0ccff;text-align:left;font-variant-numeric:tabular-nums}
#anchors{display:flex;gap:10px;font-size:.8rem;margin-top:4px}
.anch{display:flex;align-items:center;gap:4px}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block}
button{background:rgba(91,138,245,.15);border:1px solid rgba(91,138,245,.4);color:#b0ccff;border-radius:6px;padding:5px 14px;cursor:pointer;font-size:.85rem}
button:hover{background:rgba(91,138,245,.28)}
#info{font-size:.75rem;color:#3a4460;max-width:600px;text-align:center}
</style>
</head>
<body>
<h1>Artwork Alignment Fix</h1>
<div id="top">
  <select id="con-sel"></select>
  <button id="btn-reset">Reset to Auto</button>
  <label style="display:flex;align-items:center;gap:5px;cursor:pointer"><input type="checkbox" id="chk-fh"> Flip H</label>
  <label style="display:flex;align-items:center;gap:5px;cursor:pointer"><input type="checkbox" id="chk-fv"> Flip V</label>
  <label style="display:flex;align-items:center;gap:5px;cursor:pointer"><input type="checkbox" id="chk-photo"> Photo</label>
  <label style="display:flex;align-items:center;gap:5px;cursor:pointer"><input type="checkbox" id="chk-art" checked> Artwork</label>
  <div id="anchors"></div>
</div>
<canvas id="canvas" width="600" height="600"></canvas>
<div id="controls">
  <span class="lbl">Rotate</span>
  <input type="range" id="sl-rot" min="-180" max="180" step="0.5" value="0">
  <span class="val" id="vl-rot">0.0°</span>

  <span class="lbl">Scale</span>
  <input type="range" id="sl-scl" min="20" max="300" step="1" value="100">
  <span class="val" id="vl-scl">1.00×</span>

  <span class="lbl">X offset</span>
  <input type="range" id="sl-dx" min="-300" max="300" step="1" value="0">
  <span class="val" id="vl-dx">0px</span>

  <span class="lbl">Y offset</span>
  <input type="range" id="sl-dy" min="-300" max="300" step="1" value="0">
  <span class="val" id="vl-dy">0px</span>

  <span class="lbl">Opacity</span>
  <input type="range" id="sl-op" min="0" max="100" step="1" value="50">
  <span class="val" id="vl-op">50%</span>
</div>
<div id="info">Anchor stars shown as ● on the canvas. Drag sliders to align the figure.</div>

function hashStr(s){let h=0;for(let i=0;i<s.length;i++)h=(Math.imul(31,h)+s.charCodeAt(i))|0;return h>>>0}
function makeRng(seed){let s=seed;return()=>{s=(s*1664525+1013904223)>>>0;return s/4294967296}}
function magToR(m){return m<=-1?7:m<0?6:m<1?5:m<2?3.8:m<3?2.8:m<4?2.0:m<5?1.4:1.0}
function starCol(h){return h==='r'?'#ff7060':h==='o'?'#ffb860':h==='b'?'#90c8ff':'#f5eedc'}


// ═══════════════════════════════════════════════════════════
// PROJECTION  (RA/Dec → canvas x/y)
// ═══════════════════════════════════════════════════════════

// Compute projection parameters from a constellation's star array.
// Returns {cRA, cDec, cosD, scale, wrapped} — reusable for any RA/Dec point.
function getProjection(stars, W, H){
  const PAD = 0.12;
  let ras = stars.map(s => s[0]);
  const wrapped = Math.max(...ras) - Math.min(...ras) > 180;
  if(wrapped) ras = ras.map(r => r < 180 ? r + 360 : r);
  const decs  = stars.map(s => s[1]);
  const cRA   = (Math.min(...ras)  + Math.max(...ras))  / 2;
  const cDec  = (Math.min(...decs) + Math.max(...decs)) / 2;
  const cosD  = Math.cos(cDec * Math.PI / 180);
  const raSky = (Math.max(...ras) - Math.min(...ras)) * cosD;
  const decSp = Math.max(...decs) - Math.min(...decs);
  const scale = Math.max(raSky, decSp) / (1 - 2 * PAD) || 1;
  return {cRA, cDec, cosD, scale, wrapped, W, H};
}

// Project a single RA/Dec point using pre-computed projection params.
function projectPoint(ra, dec, p){
  let r = ra;
  if(p.wrapped && r < 180) r += 360;
  return {
    x: p.W/2 + (p.cRA - r) * p.cosD / p.scale * p.W,
    y: p.H/2 - (dec - p.cDec) / p.scale * p.H
  };
}

// Project all stars in a constellation to canvas coords.
function projectStars(stars, W, H){
  const p = getProjection(stars, W, H);
  return stars.map(s => ({...projectPoint(s[0], s[1], p), mag:s[2], hint:s[3], name:s[4]}));
}

// TAN (gnomonic) projection — matches Stellarium's rendering and the photo projection.
function projectPointTAN(ra, dec, con, W, H){
  const ra0=con.ra*Math.PI/180, dec0=con.dec*Math.PI/180;
  const scale=(W/2)/Math.tan(con.fov*Math.PI/360);
  const r=ra*Math.PI/180, d=dec*Math.PI/180;
  const denom=Math.sin(dec0)*Math.sin(d)+Math.cos(dec0)*Math.cos(d)*Math.cos(r-ra0);
  const xi=Math.cos(d)*Math.sin(r-ra0)/denom;
  const eta=(Math.cos(dec0)*Math.sin(d)-Math.sin(dec0)*Math.cos(d)*Math.cos(r-ra0))/denom;
  return {x:W/2-xi*scale, y:H/2-eta*scale};
}

function projectStarsTAN(stars, con, W, H){
  return stars.map(s=>({...projectPointTAN(s[0],s[1],con,W,H),mag:s[2],hint:s[3],name:s[4]}));
}


function drawBackground(ctx, W, H, con, starField){
  const bg = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.hypot(W,H)/2);
  bg.addColorStop(0,'#0b0e1e'); bg.addColorStop(1,'#020408');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  if(!starField) return;
  const rng=makeRng(hashStr(con.name+'-bg'));
  ctx.save();
  for(let i=0;i<180;i++){
    const bx=rng()*W, by=rng()*H, m=3.8+rng()*3;
    const r=Math.max(.2,1.2-m*.15);
    ctx.globalAlpha=.12+rng()*.45;
    ctx.fillStyle=rng()>.8?'rgba(160,190,255,1)':'rgba(210,218,255,1)';
    ctx.beginPath(); ctx.arc(bx,by,r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1; ctx.restore();
}

function drawLines(ctx, proj, con){
  ctx.save();
  ctx.strokeStyle='rgba(80,145,230,0.52)';
  ctx.lineWidth=1.5;
  ctx.shadowColor='rgba(100,160,255,0.4)';
  ctx.shadowBlur=5;
  for(const [i,j] of con.lines){
    const a=proj[i], b=proj[j];
    if(!a||!b) continue;
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
  }
  ctx.restore();
}

function drawStars(ctx, proj){
  for(const p of proj){
    const r=magToR(p.mag), col=starCol(p.hint);
    if(p.mag<2.5){
      const gs=p.mag<0?26:p.mag<1?18:p.mag<2?13:8;
      const grd=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,gs);
      const hx=col.replace('#','');
      const ri=parseInt(hx.slice(0,2),16),gi=parseInt(hx.slice(2,4),16),bi=parseInt(hx.slice(4,6),16);
      grd.addColorStop(0,`rgba(${ri},${gi},${bi},0.28)`);
      grd.addColorStop(1,`rgba(${ri},${gi},${bi},0)`);
      ctx.fillStyle=grd;
      ctx.beginPath(); ctx.arc(p.x,p.y,gs,0,Math.PI*2); ctx.fill();
    }
    ctx.save();
    ctx.shadowColor=col; ctx.shadowBlur=p.mag<2?8:p.mag<3?4:2;
    ctx.fillStyle=col;
    ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function drawLabels(ctx, proj, W){
  const fs=Math.max(10,Math.round(W*0.036));
  ctx.save();
  const baseAlpha=ctx.globalAlpha;
  ctx.font=`${fs}px system-ui,-apple-system,sans-serif`;
  ctx.textBaseline='middle';
  for(const p of proj){
    if(!p.name) continue;
    const col=starCol(p.hint), r=magToR(p.mag), pad=3;
    const tw=ctx.measureText(p.name).width, th=fs;
    const toRight=(p.x+r+6+tw+pad*2)<W-4;
    const lx=toRight?p.x+r+6:p.x-r-6-tw-pad*2, ly=p.y-th/2-pad;
    ctx.fillStyle='rgba(4,6,18,0.82)';
    ctx.beginPath();
    if(ctx.roundRect) ctx.roundRect(lx,ly,tw+pad*2,th+pad*2,3); else ctx.rect(lx,ly,tw+pad*2,th+pad*2);
    ctx.fill();
    ctx.fillStyle=col; ctx.globalAlpha=baseAlpha*0.92; ctx.textAlign='left';
    ctx.fillText(p.name,lx+pad,ly+pad+th/2);
    ctx.globalAlpha=baseAlpha;
  }
  ctx.restore();
}


function solveSimilarity(src, dst){
  const n=src.length;
  const sx=src.reduce((s,p)=>s+p[0],0)/n, sy=src.reduce((s,p)=>s+p[1],0)/n;
  const dx=dst.reduce((s,p)=>s+p[0],0)/n, dy=dst.reduce((s,p)=>s+p[1],0)/n;
  // Work in centred coordinates
  const sc=src.map(p=>[p[0]-sx,p[1]-sy]);
  const dc=dst.map(p=>[p[0]-dx,p[1]-dy]);
  let num_a=0, num_b=0, denom=0;
  for(let i=0;i<n;i++){
    num_a += sc[i][0]*dc[i][0] + sc[i][1]*dc[i][1];
    num_b += sc[i][0]*dc[i][1] - sc[i][1]*dc[i][0];
    denom += sc[i][0]*sc[i][0] + sc[i][1]*sc[i][1];
  }
  const a=num_a/denom, b=num_b/denom;
  // Translation: maps centroid of src to centroid of dst
  const e=dx - a*sx + b*sy;
  const f=dy - b*sx - a*sy;
  return [a,b,-b,a,e,f];
}



// ── Matrix helpers ────────────────────────────────────────────────────────────
// Canvas transform [a,b,c,d,e,f] represents matrix [[a,c,e],[b,d,f],[0,0,1]]
function matMul(A, B){
  const [a1,b1,c1,d1,e1,f1]=A, [a2,b2,c2,d2,e2,f2]=B;
  return [a1*a2+c1*b2, b1*a2+d1*b2, a1*c2+c1*d2, b1*c2+d1*d2,
          a1*e2+c1*f2+e1, b1*e2+d1*f2+f1];
}

function makeTweak(cx, cy, angleDeg, scl, dx, dy){
  const θ=angleDeg*Math.PI/180, c=Math.cos(θ), s=Math.sin(θ);
  return [c*scl, s*scl, -s*scl, c*scl,
          scl*(-c*cx+s*cy)+cx+dx, scl*(-s*cx-c*cy)+cy+dy];
}

// ── State ─────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const ANCHOR_COLORS = ['#f87171','#34d399','#60a5fa'];

let con, img, anchorCanvasPts, photoImg;
let tweakAngle=0, tweakScale=1, tweakDx=0, tweakDy=0, opacity=0.5;
let flipH=false, flipV=false, showPhoto=false, showArt=true;

// ── Populate selector ─────────────────────────────────────────────────────────
const sel = document.getElementById('con-sel');
for(const entry of [...C].sort((a,b)=>a.name.localeCompare(b.name))){
  const opt = document.createElement('option');
  opt.value = entry.abbr;
  opt.textContent = entry.name + ' (' + entry.abbr + ')' + (ART[entry.abbr] ? '' : ' *');
  if(entry.abbr==='UMi') opt.selected=true;
  sel.appendChild(opt);
}

// ── Compute base transform + draw ─────────────────────────────────────────────
function load(abbr){
  con = C.find(c=>c.abbr===abbr);
  if(!con){ return; }
  const art = ART[abbr];
  if(!art){
    anchorCanvasPts = []; resetSliders();
    photoImg = null;
    const pimg2 = new Image();
    pimg2.onload = () => { photoImg = pimg2; drawDiagram(); };
    pimg2.src = `img/${abbr}.jpg`;
    drawDiagram(); return;
  }

  anchorCanvasPts = art.anchors.map(a=>projectPointTAN(a.ra, a.dec, con, W, H));
  resetSliders();

  photoImg = null;
  const pimg = new Image();
  pimg.onload = () => { photoImg = pimg; if(img) render(); else drawDiagram(); };
  pimg.src = `img/${abbr}.jpg`;

  img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    render();
  };
  img.onerror = () => { drawDiagram(); };
  img.src = art.url;

  drawDiagram(); // show diagram while loading
  updateAnchorLegend(art);
}

function updateAnchorLegend(art){
  const div = document.getElementById('anchors');
  div.innerHTML = art.anchors.map((a,i)=>{
    const name = (con.stars.find(s=>Math.abs(s[0]-a.ra)<0.01)) ? '' : '';
    return '<div class="anch"><span class="dot" style="background:'+ANCHOR_COLORS[i]+'"></span> HIP anchor '+( i+1)+'</div>';
  }).join('');
}

function drawDiagram(){
  if(showPhoto && photoImg){
    ctx.drawImage(photoImg, 0, 0, W, H);
  } else {
    drawBackground(ctx, W, H, con, true);
  }
  ctx.save();
  if(anchorCanvasPts && anchorCanvasPts.length > 0){
    const cx = anchorCanvasPts.reduce((s,p)=>s+p.x,0)/anchorCanvasPts.length;
    const cy = anchorCanvasPts.reduce((s,p)=>s+p.y,0)/anchorCanvasPts.length;
    const [ta,tb,tc,td,te,tf] = makeTweak(cx, cy, tweakAngle, tweakScale, tweakDx, tweakDy);
    ctx.transform(ta,tb,tc,td,te,tf);
  }
  ctx.globalAlpha = opacity;
  const proj = projectStarsTAN(con.stars, con, W, H);
  drawLines(ctx, proj, con);
  drawStars(ctx, proj);
  drawLabels(ctx, proj, W);
  ctx.restore();
}

function computeBase(){
  // Always solve without flip — flips are applied in canvas space in render()
  const art = ART[con.abbr];
  const iw=img.naturalWidth, ih=img.naturalHeight;
  const imgPts = art.anchors.map(a=>[a.px*iw, a.py*ih]);
  const dstPts = anchorCanvasPts.map(p=>[p.x,p.y]);
  return solveSimilarity(imgPts, dstPts);
}

function render(){
  if(!con) return;
  drawDiagram();
  if(!img) return;

  // Centroid of canvas anchor points — center for rotation, scale, and flip
  const cx = anchorCanvasPts.reduce((s,p)=>s+p.x,0)/anchorCanvasPts.length;
  const cy = anchorCanvasPts.reduce((s,p)=>s+p.y,0)/anchorCanvasPts.length;

  // Flip in canvas space: mirror around the centroid of the anchor stars.
  // H flip: x → 2*cx - x   V flip: y → 2*cy - y   Both: 180° rotation around centroid.
  let flip = [1,0,0,1,0,0];
  if(flipH) flip = matMul(flip, [-1,0,0,1,2*cx,0]);
  if(flipV) flip = matMul(flip, [1,0,0,-1,0,2*cy]);

  const tweak = makeTweak(cx, cy, tweakAngle, tweakScale, tweakDx, tweakDy);
  const xform = matMul(tweak, matMul(flip, computeBase()));
  const [a,b,c,d,e,f] = xform;

  if(showArt){
    ctx.save();
    ctx.setTransform(a,b,c,d,e,f);
    ctx.globalAlpha = opacity;
    ctx.drawImage(img, 0, 0, img.naturalWidth, img.naturalHeight);
    ctx.restore();
  }

  // Compute where each artwork anchor (px,py) lands in canvas space
  const art = ART[con.abbr];
  const iw = img.naturalWidth, ih = img.naturalHeight;
  const artCanvasPts = art.anchors.map(anch => {
    const ix = anch.px * iw, iy = anch.py * ih;
    return { x: a*ix + c*iy + e, y: b*ix + d*iy + f };
  });

  // Anchor stars move with the diagram tweak, so apply tweak to their canvas positions
  const [ta,tb,tc,td,te,tf] = tweak;
  const tweakedAnchors = anchorCanvasPts.map(p => ({
    x: ta*p.x + tc*p.y + te, y: tb*p.x + td*p.y + tf
  }));
  ctx.save();
  ctx.globalAlpha = opacity;
  ctx.lineWidth = 1.5;
  tweakedAnchors.forEach((p, i) => {
    ctx.strokeStyle = ANCHOR_COLORS[i];
    // + cross at tweaked star position
    ctx.beginPath(); ctx.moveTo(p.x-8,p.y); ctx.lineTo(p.x+8,p.y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(p.x,p.y-8); ctx.lineTo(p.x,p.y+8); ctx.stroke();
    // × cross at artwork anchor position
    const q = artCanvasPts[i];
    ctx.beginPath(); ctx.moveTo(q.x-7,q.y-7); ctx.lineTo(q.x+7,q.y+7); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(q.x+7,q.y-7); ctx.lineTo(q.x-7,q.y+7); ctx.stroke();
  });
  ctx.restore();
}

// ── Slider wiring ─────────────────────────────────────────────────────────────
function resetSliders(){
  tweakAngle=0; tweakScale=1; tweakDx=0; tweakDy=0; opacity=0.5;
  document.getElementById('sl-rot').value=0;
  document.getElementById('sl-scl').value=100;
  document.getElementById('sl-dx').value=0;
  document.getElementById('sl-dy').value=0;
  document.getElementById('sl-op').value=50;
  updateLabels();
}

function updateLabels(){
  document.getElementById('vl-rot').textContent = tweakAngle.toFixed(1)+'°';
  document.getElementById('vl-scl').textContent = tweakScale.toFixed(2)+'×';
  document.getElementById('vl-dx').textContent  = tweakDx+'px';
  document.getElementById('vl-dy').textContent  = tweakDy+'px';
  document.getElementById('vl-op').textContent  = Math.round(opacity*100)+'%';
}

document.getElementById('sl-rot').addEventListener('input', e=>{
  tweakAngle=parseFloat(e.target.value); updateLabels(); render();
});
document.getElementById('sl-scl').addEventListener('input', e=>{
  tweakScale=parseInt(e.target.value)/100; updateLabels(); render();
});
document.getElementById('sl-dx').addEventListener('input', e=>{
  tweakDx=parseInt(e.target.value); updateLabels(); render();
});
document.getElementById('sl-dy').addEventListener('input', e=>{
  tweakDy=parseInt(e.target.value); updateLabels(); render();
});
document.getElementById('sl-op').addEventListener('input', e=>{
  opacity=parseInt(e.target.value)/100; updateLabels(); render();
});
document.getElementById('btn-reset').addEventListener('click', ()=>{
  resetSliders(); render();
});
document.getElementById('chk-fh').addEventListener('change', e=>{ flipH=e.target.checked; render(); });
document.getElementById('chk-fv').addEventListener('change', e=>{ flipV=e.target.checked; render(); });
document.getElementById('chk-photo').addEventListener('change', e=>{ showPhoto=e.target.checked; img ? render() : drawDiagram(); });
document.getElementById('chk-art').addEventListener('change', e=>{ showArt=e.target.checked; img ? render() : drawDiagram(); });
sel.addEventListener('change', e=>{
  img=null; flipH=false; flipV=false;
  document.getElementById('chk-fh').checked=false;
  document.getElementById('chk-fv').checked=false;
  load(e.target.value);
});

// ── Boot ──────────────────────────────────────────────────────────────────────
load('UMi');
</script>
</body>
</html>
