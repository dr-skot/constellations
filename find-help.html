<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Finding … — Constellate</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/explore.css">
  <style>
    header {
      display: flex;
      align-items: baseline;
      gap: 14px;
      margin-bottom: 8px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.05rem;
      font-weight: 300;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: #a8bfff;
    }

    header .sub {
      font-size: .8rem;
      color: var(--dim);
    }

    header a {
      margin-left: auto;
      font-size: .8rem;
      color: var(--accent);
      text-decoration: none;
    }

    header a:hover { text-decoration: underline; }

    #picker {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 32px;
    }

    #picker p {
      font-size: .9rem;
      color: var(--dim);
    }

    #picker-row {
      display: flex;
      gap: 10px;
    }

    #picker-input {
      flex: 1;
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      font-size: .9rem;
    }

    #picker-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    #picker-msg {
      font-size: .8rem;
      color: var(--err);
      min-height: 1.2em;
    }
  </style>
</head>

<body>
  <div id="app">

    <header>
      <h1>Constellate</h1>
      <span class="sub" id="page-sub">Finding …</span>
      <a href="find-help.html">← Back</a>
    </header>

    <div id="picker" style="display:none">
      <p>Which constellation would you like to find?</p>
      <div id="picker-row">
        <input type="text" id="picker-input" list="con-search-list" placeholder="Type a constellation name…"
          autocomplete="off">
        <datalist id="con-search-list"></datalist>
        <button class="btn-go" id="picker-go">Go →</button>
      </div>
      <div id="picker-msg"></div>
    </div>

    <div id="screen-explore" class="screen">
      <div class="screen-body">
        <div class="explore-layers" style="display:none">
          <label><input type="checkbox" id="chk-ex-photo"> Photo</label>
          <label><input type="checkbox" id="chk-ex-diagram" checked> Diagram</label>
          <label><input type="checkbox" id="chk-ex-bounds"> Bounds</label>
          <label><input type="checkbox" id="chk-ex-art"> Art</label>
          <label><input type="checkbox" id="chk-ex-starlabels"> Star names</label>
          <label><input type="checkbox" id="chk-ex-connames" checked> Con. names</label>
          <label><input type="checkbox" id="chk-ex-equator"> Equator</label>
        </div>
        <div id="explore-area">
          <div id="explore-wrap">
            <canvas id="explore-gl-canvas"></canvas>
            <canvas id="explore-canvas"></canvas>
            <canvas id="annotation-canvas" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none"></canvas>
          </div>
        </div>
      </div>
      <div id="find-guide-overlay">
        <div id="fg-info-row">
          <div id="fg-step-row">
            <div id="fg-step-dots"></div>
            <span id="fg-step-count"></span>
          </div>
        </div>
        <div id="fg-caption-label"></div>
        <p id="fg-caption-text"></p>
        <div id="fg-nav-row">
          <button id="fg-btn-prev">← Back</button>
          <button id="fg-btn-toggle-diag" style="display:none">Show overlays</button>
          <button id="fg-btn-next">Next →</button>
        </div>
      </div>
    </div>

  </div>

  <script src="js/data.js"></script>
  <script src="js/projection.js"></script>
  <script src="js/render.js"></script>
  <script src="js/explore-gl.js"></script>
  <script src="js/explore.js"></script>
  <script src="js/guide-renderer.js"></script>
  <script>
    // ── Resolve constellation from URL param ──────────────────────────────────
    const params = new URLSearchParams(location.search);
    const conParam = params.get('con');
    const con = conParam
      ? C.find(c => c.abbr.toLowerCase() === conParam.toLowerCase() ||
        c.name.toLowerCase() === conParam.toLowerCase())
      : null;

    if (!con) {
      document.getElementById('page-sub').textContent = 'Finding …';
      const picker = document.getElementById('picker');
      picker.style.display = '';
      const dl = document.getElementById('con-search-list');
      [...C].sort((a, b) => a.name.localeCompare(b.name)).forEach(c => {
        const o = document.createElement('option'); o.value = c.name; dl.appendChild(o);
      });
      const go = () => {
        const val = document.getElementById('picker-input').value.trim();
        const found = C.find(c => c.name.toLowerCase() === val.toLowerCase() ||
          c.abbr.toLowerCase() === val.toLowerCase());
        if (found) { location.href = 'find-help.html?con=' + found.abbr; }
        else { document.getElementById('picker-msg').textContent = 'Unknown constellation'; }
      };
      document.getElementById('picker-go').addEventListener('click', go);
      document.getElementById('picker-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') go();
      });
    } else {
      document.title = `Finding ${con.name} — Constellate`;
      document.getElementById('page-sub').textContent = `Finding ${con.name}`;
      document.getElementById('screen-explore').classList.add('active');
    }

    // ── Boot ──────────────────────────────────────────────────────────────────
    if (con) {
      Promise.all([
        fetch('js/finding-guides.json').then(r => r.json()),
        fetch('js/sky-objects.json').then(r => r.json()),
      ]).then(([guides, catalog]) => {
          const guide = guides[con.name];
          if (!guide || !guide.steps || !guide.steps.length) {
            document.getElementById('fg-caption-label').textContent = con.name;
            document.getElementById('fg-caption-text').textContent = 'No finding guide is available for this constellation yet.';
            document.getElementById('fg-btn-next').disabled = true;
            document.getElementById('fg-btn-prev').disabled = true;
            return;
          }
          init(guide, catalog);
        })
        .catch(() => {
          document.getElementById('fg-caption-text').textContent = 'Could not load finding guide.';
        });
    }

    function init(guide, catalog) {
      initExploreGL(document.getElementById('explore-gl-canvas'));

      const steps = guide.steps.map(s => Object.assign({}, s));
      const startRa = Math.random() * 360;
      const startDec = (Math.random() * 2 - 1) * 60;
      steps.forEach(s => { if (s.random) { s.ra = startRa; s.dec = startDec; } });

      explore.R = guide.rotation != null
        ? guide.rotation
        : guideNorthUpR(raDecToVec(con.ra, con.dec));

      document.addEventListener('keydown', e => {
        if (e.key === 'ArrowRight') document.getElementById('fg-btn-next').click();
        if (e.key === 'ArrowLeft') document.getElementById('fg-btn-prev').click();
      });

      guideStart(steps, catalog, {
        stepKey: `find-help-step-${con.abbr}`,
        onLastNext: () => { window.location.href = 'find-help.html'; },
      });
    }
  </script>
</body>

</html>
