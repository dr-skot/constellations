<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Finding … — Constellate</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    :root {
      --bg: #05060f;
      --card: #0c0f1e;
      --border: rgba(255, 255, 255, .08);
      --accent: #5b8af5;
      --text: #d8e2ff;
      --dim: #5a6480;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 14px 16px 28px;
    }

    header {
      width: 100%;
      max-width: 600px;
      display: flex;
      align-items: baseline;
      gap: 14px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 1.05rem;
      font-weight: 300;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: #a8bfff;
    }

    header .sub {
      font-size: .8rem;
      color: var(--dim);
    }

    header a {
      margin-left: auto;
      font-size: .8rem;
      color: var(--accent);
      text-decoration: none;
    }

    header a:hover {
      text-decoration: underline;
    }

    #explore-wrap {
      position: relative;
      width: 100%;
      max-width: 600px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #010208;
      flex-shrink: 0;
    }

    #explore-wrap::after {
      content: '';
      display: block;
      padding-top: 100%;
    }

    #explore-gl-canvas,
    #explore-canvas,
    #annotation-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #annotation-canvas {
      pointer-events: none;
    }

    .step-row {
      width: 100%;
      max-width: 600px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 2px 8px;
    }

    .step-dots {
      display: flex;
      gap: 6px;
    }

    .step-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .15);
      transition: background .25s;
    }

    .step-dot.done {
      background: rgba(91, 138, 245, .45);
    }

    .step-dot.active {
      background: var(--accent);
    }

    .step-count {
      font-size: .72rem;
      color: var(--dim);
    }

    .caption-card {
      width: 100%;
      max-width: 600px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 14px;
      min-height: 90px;
    }

    .caption-label {
      font-size: .68rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 7px;
    }

    .caption-text {
      font-size: .9rem;
      line-height: 1.6;
      color: var(--text);
    }

    .nav {
      width: 100%;
      max-width: 600px;
      display: flex;
      gap: 10px;
      justify-content: space-between;
    }

    .btn {
      padding: 9px 22px;
      border-radius: 8px;
      cursor: pointer;
      font-size: .85rem;
      border: 1px solid var(--accent);
      background: rgba(91, 138, 245, .12);
      color: #b0ccff;
      transition: background .15s;
    }

    .btn:hover {
      background: rgba(91, 138, 245, .22);
    }

    .btn:disabled {
      opacity: .28;
      cursor: default;
      background: rgba(91, 138, 245, .06);
    }

    .btn.primary {
      background: rgba(91, 138, 245, .25);
      color: #d8eaff;
    }

    .btn.primary:hover {
      background: rgba(91, 138, 245, .38);
    }

    #picker {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 32px;
    }

    #picker p {
      font-size: .9rem;
      color: var(--dim);
    }

    #picker-row {
      display: flex;
      gap: 10px;
    }

    #picker-input {
      flex: 1;
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      font-size: .9rem;
    }

    #picker-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    #picker-msg {
      font-size: .8rem;
      color: var(--err, #ef4444);
      min-height: 1.2em;
    }
  </style>
</head>

<body>

  <!-- Dummy IDs that drawExplore() reads -->
  <div id="screen-explore" class="active" style="display:none"></div>
  <input type="checkbox" id="chk-ex-photo" style="display:none">
  <input type="checkbox" id="chk-ex-diagram" style="display:none" checked>
  <input type="checkbox" id="chk-ex-bounds" style="display:none">
  <input type="checkbox" id="chk-ex-art" style="display:none">
  <input type="checkbox" id="chk-ex-starlabels" style="display:none">
  <input type="checkbox" id="chk-ex-connames" style="display:none" checked>
  <input type="checkbox" id="chk-ex-equator" style="display:none">

  <header>
    <h1>Constellate</h1>
    <span class="sub" id="page-sub">Finding …</span>
    <a href="index.html">← Back</a>
  </header>

  <div id="picker" style="display:none">
    <p>Which constellation would you like to find?</p>
    <div id="picker-row">
      <input type="text" id="picker-input" list="con-search-list" placeholder="Type a constellation name…"
        autocomplete="off">
      <datalist id="con-search-list"></datalist>
      <button class="btn primary" id="picker-go">Go →</button>
    </div>
    <div id="picker-msg"></div>
  </div>

  <div id="explore-wrap">
    <canvas id="explore-gl-canvas"></canvas>
    <canvas id="explore-canvas"></canvas>
    <canvas id="annotation-canvas"></canvas>
  </div>

  <div class="step-row">
    <div class="step-dots" id="step-dots"></div>
    <span class="step-count" id="step-count"></span>
  </div>

  <div class="caption-card">
    <div class="caption-label" id="caption-label"></div>
    <div class="caption-text" id="caption-text"></div>
  </div>

  <div class="nav">
    <button class="btn" id="btn-prev">← Back</button>
    <button class="btn" id="btn-toggle-diag" style="display:none">Show Diagrams</button>
    <button class="btn primary" id="btn-next">Next →</button>
  </div>

  <script src="js/data.js"></script>
  <script src="js/projection.js"></script>
  <script src="js/render.js"></script>
  <script src="js/explore-gl.js"></script>
  <script src="js/explore.js"></script>
  <script>
    // ── Resolve constellation from URL param ──────────────────────────────────
    const params = new URLSearchParams(location.search);
    const conParam = params.get('con');
    const con = conParam
      ? C.find(c => c.abbr.toLowerCase() === conParam.toLowerCase() ||
        c.name.toLowerCase() === conParam.toLowerCase())
      : null;

    if (!con) {
      document.getElementById('page-sub').textContent = 'Finding …';
      document.getElementById('explore-wrap').style.display = 'none';
      document.querySelector('.step-row').style.display = 'none';
      document.querySelector('.caption-card').style.display = 'none';
      document.querySelector('.nav').style.display = 'none';
      const picker = document.getElementById('picker');
      picker.style.display = '';
      const dl = document.getElementById('con-search-list');
      [...C].sort((a, b) => a.name.localeCompare(b.name)).forEach(c => {
        const o = document.createElement('option'); o.value = c.name; dl.appendChild(o);
      });
      const go = () => {
        const val = document.getElementById('picker-input').value.trim();
        const found = C.find(c => c.name.toLowerCase() === val.toLowerCase() ||
          c.abbr.toLowerCase() === val.toLowerCase());
        if (found) { location.href = 'find-help.html?con=' + found.abbr; }
        else { document.getElementById('picker-msg').textContent = 'Unknown constellation'; }
      };
      document.getElementById('picker-go').addEventListener('click', go);
      document.getElementById('picker-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') go();
      });
    } else {
      document.title = `Finding ${con.name} — Constellate`;
      document.getElementById('page-sub').textContent = `Finding ${con.name}`;
    }

    // ── Render helpers ────────────────────────────────────────────────────────
    function drawScene() {
      explore.quiz = null;
      drawExplore();
    }

    function drawAnnotation(step) {
      const ann = document.getElementById('annotation-canvas');
      const src = document.getElementById('explore-canvas');
      const W = src.width, H = src.height;
      ann.width = W; ann.height = H;
      const ctx = ann.getContext('2d');
      ctx.clearRect(0, 0, W, H);
      if (!step || !step.highlight || !step.highlight.length) return;

      const camUp = cameraReverse(explore.P, explore.R, [0, 1, 0]);
      const dpr = window.devicePixelRatio || 1;
      const scale = W / (src.offsetWidth || W / dpr);

      ctx.save();
      for (const h of step.highlight) {
        if (h.line) {
          const projected = h.line.map(([ra, dec]) => {
            const p = projectStarsCamera([[ra, dec, 0]], explore.P, camUp, explore.fov, W, H)[0];
            return (p && p.d > 0) ? p : null;
          });
          const valid = projected.filter(p => p);
          ctx.strokeStyle = h.color;
          ctx.lineWidth = Math.max(1.5, 1.5 * scale);
          ctx.shadowColor = h.color;
          ctx.shadowBlur = 4 * scale;
          ctx.setLineDash([4 * scale, 5 * scale]);
          ctx.beginPath();
          let started = false;
          for (const p of projected) {
            if (!p) { started = false; continue; }
            if (!started) { ctx.moveTo(p.x, p.y); started = true; }
            else ctx.lineTo(p.x, p.y);
          }
          ctx.stroke();
          ctx.setLineDash([]);
          // Arrowheads at both ends
          function drawArrowHead(tipX, tipY, dirX, dirY) {
            const size = 5 * scale, a = Math.PI / 6;
            for (const sign of [-1, 1]) {
              const ang = Math.PI + a * sign;
              ctx.beginPath();
              ctx.moveTo(tipX, tipY);
              ctx.lineTo(tipX + size * (dirX * Math.cos(ang) - dirY * Math.sin(ang)),
                tipY + size * (dirX * Math.sin(ang) + dirY * Math.cos(ang)));
              ctx.stroke();
            }
          }
          if (valid.length >= 2) {
            const lw = 5 * scale;
            const p0 = valid[0], p1 = valid[1];
            const d0 = Math.hypot(p0.x - p1.x, p0.y - p1.y);
            if (d0 > 0) {
              const nx = (p0.x - p1.x) / d0, ny = (p0.y - p1.y) / d0;
              drawArrowHead(p0.x + nx * lw, p0.y + ny * lw, nx, ny);
            }
            const pn = valid[valid.length - 1], pm = valid[valid.length - 2];
            const dn = Math.hypot(pn.x - pm.x, pn.y - pm.y);
            if (dn > 0) {
              const nx = (pn.x - pm.x) / dn, ny = (pn.y - pm.y) / dn;
              drawArrowHead(pn.x + nx * lw, pn.y + ny * lw, nx, ny);
            }
          }
          ctx.shadowBlur = 0;
          if (h.label && valid.length) {
            const first = valid[0];
            const fs = Math.round(13 * scale);
            ctx.font = `bold ${fs}px system-ui, sans-serif`;
            ctx.textBaseline = 'middle';
            const lx = first.x + 6 * scale, ly = first.y - 10 * scale;
            ctx.strokeStyle = '#010208'; ctx.lineWidth = 3 * scale; ctx.lineJoin = 'round';
            ctx.strokeText(h.label, lx, ly);
            ctx.fillStyle = h.color; ctx.fillText(h.label, lx, ly);
          }
        } else {
          const pts = projectStarsCamera([[h.ra, h.dec, 0]], explore.P, camUp, explore.fov, W, H);
          const p = pts[0];
          if (!p || p.d <= 0) continue;
          const r = h.r * scale;
          const fs = Math.round(13 * scale);
          ctx.strokeStyle = h.color;
          ctx.lineWidth = Math.max(1.5, 1.5 * scale);
          ctx.shadowColor = h.color;
          ctx.shadowBlur = r * 0.7;
          ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI * 2); ctx.stroke();
          ctx.shadowBlur = 0;
          ctx.font = `bold ${fs}px system-ui, sans-serif`;
          ctx.textBaseline = 'middle';
          const lx = p.x + r + 6 * scale, ly = p.y;
          ctx.strokeStyle = '#010208'; ctx.lineWidth = 3 * scale; ctx.lineJoin = 'round';
          ctx.strokeText(h.label, lx, ly);
          ctx.fillStyle = h.color; ctx.fillText(h.label, lx, ly);
        }
      }
      ctx.restore();
    }

    function animateTo(step, onDone) {
      if (explore.animFrame) { cancelAnimationFrame(explore.animFrame); explore.animFrame = null; }
      const v1 = explore.P.slice(), f1 = explore.fov;
      const v2 = raDecToVec(step.ra, step.dec), f2 = step.fov;
      const dot = Math.max(-1, Math.min(1, v1[0] * v2[0] + v1[1] * v2[1] + v1[2] * v2[2]));
      const angle = Math.acos(dot), sinA = Math.sin(angle);
      const duration = Math.max(700, Math.min(2600, (angle / Math.PI) * 2600 + Math.abs(f2 - f1) * 10));
      const start = performance.now();
      function tick(now) {
        const raw = Math.min(1, (now - start) / duration);
        const t = raw < 0.5 ? 4 * raw * raw * raw : 1 - Math.pow(-2 * raw + 2, 3) / 2;
        if (angle > 0.001) {
          const fa = Math.sin((1 - t) * angle) / sinA, fb = Math.sin(t * angle) / sinA;
          explore.P = [fa * v1[0] + fb * v2[0], fa * v1[1] + fb * v2[1], fa * v1[2] + fb * v2[2]];
        }
        explore.fov = f1 + (f2 - f1) * t;
        drawScene();
        drawAnnotation(raw < 1 ? null : step);
        if (raw < 1) {
          explore.animFrame = requestAnimationFrame(tick);
        } else {
          explore.P = v2; explore.fov = f2; explore.animFrame = null;
          if (onDone) onDone();
        }
      }
      requestAnimationFrame(tick);
    }

    // ── North-up rotation ─────────────────────────────────────────────────────
    // Returns the R value that puts north (increasing dec) at the top of the
    // view when the camera is pointing at position P.
    function northUpR(P) {
      const pz = P[2];
      const cos2 = 1 - pz * pz;
      if (cos2 < 1e-10) return 0; // looking straight at a pole
      const s = Math.sqrt(cos2);
      const northDir = [-pz * P[0] / s, -pz * P[1] / s, cos2 / s];
      const q = rotateByFromTo(northDir, P, [0, 0, 1]);
      return Math.atan2(q[0], q[1]);
    }

    // ── Boot ──────────────────────────────────────────────────────────────────
    fetch('js/finding-guides.json')
      .then(r => r.json())
      .then(guides => {
        const guide = guides[con.name];
        if (!guide || !guide.steps || !guide.steps.length) {
          document.getElementById('caption-label').textContent = con.name;
          document.getElementById('caption-text').textContent = 'No finding guide is available for this constellation yet.';
          document.getElementById('btn-next').disabled = true;
          document.getElementById('btn-prev').disabled = true;
          return;
        }
        init(guide);
      })
      .catch(() => {
        document.getElementById('caption-text').textContent = 'Could not load finding guide.';
      });

    function init(guide) {
      const steps = guide.steps;
      initExploreGL(document.getElementById('explore-gl-canvas'));

      const startRa = Math.random() * 360;
      const startDec = (Math.random() * 2 - 1) * 60;
      steps.forEach(s => { if (s.random) { s.ra = startRa; s.dec = startDec; } });

      explore.P = raDecToVec(startRa, startDec);
      explore.fov = steps[0].fov || 80;
      explore.R = guide.rotation != null
        ? guide.rotation
        : northUpR(raDecToVec(con.ra, con.dec));

      const stepKey = `find-help-step-${con.abbr}`;
      let stepIdx = -1;
      let animating = false;
      let diagVisible = !!steps[0].diagram;

      function applySettings(step) {
        document.getElementById('chk-ex-photo').checked = !!step.photo;
        document.getElementById('chk-ex-diagram').checked = !!step.diagram;
        document.getElementById('chk-ex-bounds').checked = !!step.bounds;
        document.getElementById('chk-ex-art').checked = !!step.art;
        document.getElementById('chk-ex-starlabels').checked = false;
        document.getElementById('chk-ex-connames').checked = !!step.names;
        document.getElementById('chk-ex-equator').checked = !!step.equator;
      }

      function renderUI() {
        const n = steps.length;
        document.getElementById('step-dots').innerHTML = steps.map((_, i) =>
          `<div class="step-dot ${i < stepIdx ? 'done' : i === stepIdx ? 'active' : ''}"></div>`
        ).join('');
        document.getElementById('step-count').textContent = `${stepIdx + 1} / ${n}`;
        document.getElementById('caption-label').textContent = steps[stepIdx].title;
        document.getElementById('caption-text').textContent = steps[stepIdx].caption;
        document.getElementById('btn-prev').disabled = stepIdx === 0 || animating;
        const isLast = stepIdx === n - 1;
        const diagBtn2 = document.getElementById('btn-toggle-diag');
        diagBtn2.style.display = isLast ? '' : 'none';
        diagBtn2.textContent = diagVisible ? 'Hide overlays' : 'Show overlays';
        const next = document.getElementById('btn-next');
        next.textContent = isLast ? 'Done ✓' : 'Next →';
        next.disabled = animating;
      }

      function goTo(i, immediate) {
        stepIdx = i;
        localStorage.setItem(stepKey, i);
        animating = !immediate;
        diagVisible = !!steps[i].diagram;
        const step = steps[i];
        applySettings(step);
        renderUI();

        if (immediate) {
          explore.P = raDecToVec(step.ra, step.dec);
          explore.fov = step.fov;
          drawScene();
          drawAnnotation(step);
          animating = false;
          renderUI();
        } else {
          animateTo(step, () => {
            animating = false;
            renderUI();
          });
        }
      }

      const diagBtn = document.getElementById('btn-toggle-diag');
      diagBtn.addEventListener('click', () => {
        diagVisible = !diagVisible;
        diagBtn.textContent = diagVisible ? 'Hide overlays' : 'Show overlays';
        const step = steps[stepIdx];
        document.getElementById('chk-ex-diagram').checked = diagVisible && !!step.diagram;
        document.getElementById('chk-ex-connames').checked = diagVisible && !!step.names;
        document.getElementById('chk-ex-bounds').checked = diagVisible && !!step.bounds;
        document.getElementById('chk-ex-art').checked = diagVisible && !!step.art;
        drawScene();
        drawAnnotation(diagVisible ? step : null);
      });

      document.getElementById('btn-next').addEventListener('click', () => {
        if (animating) return;
        if (stepIdx === steps.length - 1) { window.location.href = 'find-help.html'; return; }
        goTo(stepIdx + 1);
      });

      document.getElementById('btn-prev').addEventListener('click', () => {
        if (animating || stepIdx === 0) return;
        goTo(stepIdx - 1);
      });

      document.addEventListener('keydown', e => {
        if (e.key === 'ArrowRight') document.getElementById('got').click();
        if (e.key === 'ArrowLeft') document.getElementById('btn-prev').click();
      });

      const saved = parseInt(localStorage.getItem(stepKey), 10);
      goTo((saved >= 0 && saved < steps.length) ? saved : 0, true);
    }
  </script>
</body>

</html>
